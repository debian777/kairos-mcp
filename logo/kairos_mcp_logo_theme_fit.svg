<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-label="KAIROS MCP logo">
  <rect width="1280" height="360" fill="#ffffff"/>

  <!-- icon -->
  <g transform="translate(54,52)">
    <!-- outer structured frame -->
    <polygon points="88,18 170,18 232,58 232,146 170,186 88,186 26,146 26,58"
             fill="none"
             stroke="#0f172a"
             stroke-width="14"
             stroke-linejoin="round"/>

    <!-- deterministic route -->
    <path d="M58 136 L94 100 L150 76 L188 108"
          fill="none"
          stroke="#0f766e"
          stroke-width="14"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- secondary stabilising route -->
    <path d="M94 100 L136 130"
          fill="none"
          stroke="#0f172a"
          stroke-width="12"
          stroke-linecap="round"/>

    <!-- nodes -->
    <circle cx="58" cy="136" r="18" fill="#0f172a"/>
    <circle cx="94" cy="100" r="22" fill="#0d9488"/>
    <circle cx="150" cy="76" r="22" fill="#0f766e"/>
    <circle cx="136" cy="130" r="18" fill="#0f172a"/>
    <circle cx="188" cy="108" r="18" fill="#0f766e"/>
  </g>

  <!-- wordmark -->
  <g font-family="Inter, Arial, Helvetica, sans-serif" font-weight="700">
    <text x="350" y="168" font-size="88" fill="#0f172a" letter-spacing="1.2">KAIROS</text>
    <text x="735" y="168" font-size="88" fill="#0f766e" letter-spacing="1.2">MCP</text>
  </g>

  <!-- optional subtle theme bar for presentation -->
  <rect x="0" y="318" width="1280" height="42" fill="#f8fafc"/>
</svg>
