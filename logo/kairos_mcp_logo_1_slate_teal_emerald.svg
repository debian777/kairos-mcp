<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="KAIROS MCP logo">
  <rect width="1200" height="360" fill="#ffffff"/>
  <g transform="translate(60,40)">
    <!-- hex frame -->
    <polygon points="70,40 150,40 220,80 220,160 150,200 70,200 0,160 0,80"
             fill="none" stroke="#0f172a" stroke-width="14" stroke-linejoin="round"/>
    <!-- protocol links -->
    <line x1="35" y1="150" x2="78" y2="112" stroke="#0f172a" stroke-width="14" stroke-linecap="round"/>
    <line x1="78" y1="112" x2="150" y2="82" stroke="#0f766e" stroke-width="14" stroke-linecap="round"/>
    <line x1="78" y1="112" x2="132" y2="138" stroke="#0f172a" stroke-width="14" stroke-linecap="round"/>
    <!-- nodes -->
    <circle cx="35" cy="150" r="22" fill="#0f172a"/>
    <circle cx="78" cy="112" r="24" fill="#0f766e"/>
    <circle cx="150" cy="82" r="24" fill="#0f766e"/>
    <circle cx="132" cy="138" r="22" fill="#0f172a"/>
  </g>

  <g font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="330" y="165" font-size="86" fill="#0f172a" letter-spacing="1">KAIROS</text>
    <text x="662" y="226" font-size="64" fill="#0f766e" letter-spacing="1.5">MCP</text>
  </g>
</svg>