<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KAIROS — Home (mockup)</title>
  <style>
    :root {
      --color-primary: #0d9488;
      --color-primary-hover: #0f766e;
      --color-text: #1e293b;
      --color-text-heading: #0f172a;
      --color-text-muted: #64748b;
      --color-surface: #ffffff;
      --color-surface-elevated: #f8fafc;
      --color-border: #e2e8f0;
      --color-focus-ring: #0d9488;
      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-6: 1.5rem;
      --radius-md: 0.375rem;
      --font-sans: system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body { font-family: var(--font-sans); font-size: 1rem; line-height: 1.6; color: var(--color-text); background: var(--color-surface); margin: 0; padding: 0; display: flex; min-height: 100vh; }
    .skip-link { position: absolute; top: 0; left: 0; padding: var(--space-4); background: var(--color-primary); color: white; z-index: 100; transform: translateY(-100%); transition: transform 0.2s; font-weight: 500; text-decoration: none; border-radius: 0 0 var(--radius-md) 0; }
    .skip-link:focus { transform: translateY(0); outline: 2px solid var(--color-text-heading); outline-offset: 2px; }
    .sidebar { width: 12rem; flex-shrink: 0; border-right: 1px solid var(--color-border); background: var(--color-surface-elevated); padding: var(--space-4) 0; }
    .sidebar-nav { display: flex; flex-direction: column; gap: var(--space-1); }
    .sidebar-nav a { color: var(--color-text); text-decoration: none; padding: var(--space-3) var(--space-4); min-height: 44px; display: flex; align-items: center; border-left: 3px solid transparent; }
    .sidebar-nav a:hover { background: var(--color-surface); color: var(--color-text-heading); }
    .sidebar-nav a:focus-visible { outline: 2px solid var(--color-focus-ring); outline-offset: -2px; }
    .sidebar-nav a[aria-current="page"] { font-weight: 600; color: var(--color-primary); border-left-color: var(--color-primary); background: var(--color-surface); }
    .container { flex: 1; max-width: 48rem; margin: 0; padding: var(--space-6); }
    .stats-row { display: flex; gap: var(--space-4); flex-wrap: wrap; margin-bottom: var(--space-6); }
    .stat { background: var(--color-surface-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-4); min-width: 7rem; }
    .stat-value { font-size: 1.5rem; font-weight: 600; color: var(--color-text-heading); }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--color-text-muted); margin-top: 0.25rem; }
    .page-title { font-size: 1.5rem; font-weight: 600; color: var(--color-text-heading); margin: 0 0 var(--space-4); }
    .tagline { font-size: 0.875rem; color: var(--color-text-muted); margin-bottom: var(--space-6); }
    .search-form { margin-bottom: var(--space-6); }
    .search-label { display: block; font-weight: 500; margin-bottom: var(--space-2); color: var(--color-text-heading); }
    .search-input { width: 100%; padding: var(--space-4); border: 1px solid var(--color-border); border-radius: var(--radius-md); font-size: 1rem; min-height: 44px; }
    .search-input:focus { outline: 2px solid var(--color-focus-ring); outline-offset: 2px; }
    .search-input::placeholder { color: var(--color-text-muted); }
    .search-hint { font-size: 0.875rem; color: var(--color-text-muted); margin-top: var(--space-2); }
    .cta-link { color: var(--color-primary); font-weight: 500; }
    .cta-link:hover { text-decoration: underline; }
    .cta-link:focus-visible { outline: 2px solid var(--color-focus-ring); outline-offset: 2px; }
    .add-mcp-section { margin-top: var(--space-6); padding-top: var(--space-6); border-top: 1px solid var(--color-border); }
    .add-mcp-section h2 { font-size: 1rem; font-weight: 600; color: var(--color-text-heading); margin: 0 0 var(--space-2); }
    .add-mcp-section p { font-size: 0.875rem; color: var(--color-text-muted); margin: 0 0 var(--space-4); }
    .add-mcp-buttons { display: flex; flex-wrap: wrap; gap: var(--space-2); }
    .btn-agent { display: inline-flex; align-items: center; justify-content: center; min-height: 44px; min-width: 44px; padding: 0.5rem 1rem; border-radius: var(--radius-md); font-size: 0.875rem; font-weight: 500; text-decoration: none; background: transparent; color: var(--color-text); border: 1px solid var(--color-border); cursor: pointer; font-family: var(--font-sans); }
    .btn-agent:hover { background: var(--color-surface-elevated); color: var(--color-text-heading); }
    .btn-agent:focus-visible { outline: 2px solid var(--color-focus-ring); outline-offset: 2px; }
  </style>
</head>
<body>
  <a href="#main" class="skip-link">Skip to main content</a>
  <aside class="sidebar" aria-label="Main navigation">
    <nav class="sidebar-nav">
      <a href="01-home-search.html" aria-current="page">Home</a>
      <a href="07-kairos-actions.html">KAIROS</a>
      <a href="05-account.html">Account</a>
    </nav>
  </aside>
  <main id="main" class="container">
    <h1 class="page-title">Home</h1>
    <p class="tagline">Overview of your spaces and protocols.</p>
    <form class="search-form" aria-label="Search protocols" action="07-kairos-actions.html" method="get">
      <label for="query" class="search-label">Search protocols</label>
      <input id="query" name="q" type="search" class="search-input" placeholder="e.g. deploy and test" aria-describedby="search-hint" />
      <p id="search-hint" class="search-hint">Enter a query to find protocols. Results open in the <strong>KAIROS</strong> tab.</p>
    </form>
    <div class="stats-row" aria-label="Space and protocol counts">
      <div class="stat"><span class="stat-value">12</span><span class="stat-label">Personal protocols</span></div>
      <div class="stat"><span class="stat-value">24</span><span class="stat-label">Kairos app</span></div>
      <div class="stat"><span class="stat-value">3</span><span class="stat-label">Spaces</span></div>
    </div>
    <p class="tagline">Search and manage protocols in <a href="07-kairos-actions.html" class="cta-link">KAIROS</a>.</p>
  </main>
</body>
</html>
