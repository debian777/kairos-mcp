# CodeQL config for JavaScript/TypeScript (security-extended).
# Exclude test code from analysis to avoid alerts on intentional patterns
# (e.g. integration tests sending file-derived auth tokens in requests).
name: "KAIROS CodeQL config"

# js/file-access-to-http: CLI persists the API base URL in config and uses it for OAuth/metadata fetch.
# That is intentional (not exfiltration of arbitrary file bytes). URLs are validated in
# src/cli/safe-http-url.ts (http/https only, no credentials, no query or fragment) before fetch.
#
# js/http-to-file-access: `kairos export --format skill_zip` writes the authenticated export ZIP
# from download_ref (or decodes inline base64) to --zip-out or a cwd-local name — same product as
# piping markdown export to a file. Path hints are basename-sanitized in src/cli/skill-zip-local-write.ts.
query-filters:
  - exclude:
      id: js/file-access-to-http
  - exclude:
      id: js/http-to-file-access

paths-ignore:
  - "**/*.test.ts"
  - "**/*.test.js"
  - "**/*.e2e.test.ts"
  - "tests/**"
  # CI integration harness: report bodies are shaped via snapshotForIntegrationReport;
  # CodeQL does not treat that as a sanitizer for js/http-to-file-access.
  - "scripts/test-ai-mcp-integration.mjs"
