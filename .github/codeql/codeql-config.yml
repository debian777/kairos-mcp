# CodeQL config for JavaScript/TypeScript (security-extended).
# Exclude test code from analysis to avoid alerts on intentional patterns
# (e.g. integration tests sending file-derived auth tokens in requests).
name: "KAIROS CodeQL config"

paths-ignore:
  - "**/*.test.ts"
  - "**/*.test.js"
  - "**/*.e2e.test.ts"
  - "tests/**"
  # CI integration harness: report bodies are shaped via snapshotForIntegrationReport;
  # CodeQL does not treat that as a sanitizer for js/http-to-file-access.
  - "scripts/run-ai-mcp-integration.mjs"
