name: Sync Qoder Repo Wiki to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - ".qoder/repowiki/en/content/**"
      - "scripts/build-wiki.mjs"
      - ".github/workflows/sync-qoder-repowiki-to-github-wiki.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    name: Sync .qoder/repowiki/en/content to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Checkout wiki repository
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync content and push to wiki
        run: WIKI_WORKDIR=wiki bash scripts/sync-wiki.sh
