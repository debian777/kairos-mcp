name: Sync Qoder Repo Wiki to GitHub Wiki

on:
  push:
    branches:
      - main
    paths:
      - ".qoder/repowiki/en/content/**"
      - ".github/workflows/sync-qoder-repowiki-to-github-wiki.yml"

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    name: Sync .qoder/repowiki/en/content to GitHub Wiki
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Validate source directory exists
        run: |
          set -euo pipefail

          test -d ".qoder/repowiki/en/content"

      - name: Checkout wiki repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync content to wiki repository
        run: |
          set -euo pipefail

          rsync -a --delete \
            --exclude ".git" \
            ".qoder/repowiki/en/content/" \
            "wiki/"

      - name: Commit and push wiki changes
        working-directory: wiki
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet && git diff --cached --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git add -A
          git commit -m "docs: sync Qoder Repo Wiki content"
          git push
