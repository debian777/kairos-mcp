# Enables auto-merge on Dependabot PRs. GitHub merges when all required status checks pass
# (e.g. Integration). Requires: repo Settings → Allow auto-merge; branch protection with
# required status checks on the target branch.
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/automating-dependabot-with-github-actions
name: Dependabot auto-merge

on: pull_request

permissions:
  contents: read
  pull-requests: write

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge for Dependabot PR
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
