# Integration workflow: build npm tgz, then verify in parallel (UI/static, npm+infra tests, Docker+Trivy).
# Secrets: OPENAI_API_KEY (from GitHub secrets). Infra/dev secrets are generated in verify-integration each run.
# See .github/workflows/README.md for gh secret/variable setup.
#
# build — no Docker infra (npm ci + pack only).
# verify-ui — static + UI tests; runs in parallel with build (no tgz required).
# verify-integration — starts Compose + npm ci before downloading the package artifact; then Playwright, Keycloak, install tgz, dev:test.
# verify-docker — release-equivalent image + Trivy (release safety net only).
# integration-pass — single green gate for branch protection / workflow_run.
name: Integration

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build npm package (tgz)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/run-with-github-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/run-with-github-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/*.tgz

  verify-ui:
    name: Static checks + UI tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Check versions (mem = package.json, skills = last stable)
        run: node scripts/run-with-github-summary.mjs "Version check (mem & skills)" -- npm run version:check-skills

      - name: Lint skills (skills-ref)
        run: node scripts/run-with-github-summary.mjs "Lint skills (skills-ref)" -- python3 scripts/lint_skills.py

      - name: Install dependencies
        run: node scripts/run-with-github-summary.mjs "Install dependencies" -- npm ci

      # ESLint: matches `npm run lint` / Husky pre-commit — disabled in CI for now.
      # - name: ESLint
      #   run: node scripts/run-with-github-summary.mjs "ESLint" -- npm run lint

      # Avoid re-downloading ~280MB Chromium/headless-shell/ffmpeg when lockfile unchanged
      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        id: playwright-install
        run: node scripts/run-with-github-summary.mjs "Install Playwright browsers" -- npx playwright install chromium

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache.outputs.cache-hit != 'true' && steps.playwright-install.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: TypeScript, Knip, UI tests (parallel)
        run: node scripts/run-parallel-checks-ci.mjs

  verify-integration:
    name: Infra + npm package integration (AUTH on)
    needs: [build]
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: "Generate .env (fullstack: infra + app + auth)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/run-with-github-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/generate_dev_secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Restore infra Docker image cache
        uses: actions/cache/restore@v5
        id: docker-infra-cache
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Load infra Docker images from cache
        if: steps.docker-infra-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-infra/images.tar

      # Infra + test-harness deps before the built tgz exists on this runner (overlaps with build job wall clock after this job starts).
      - name: Start Docker infra and npm ci (parallel)
        run: |
          set -euo pipefail
          ec=0
          docker compose -p kairos-mcp --env-file .env --profile fullstack up -d redis qdrant postgres keycloak &
          pid_compose=$!
          node scripts/run-with-github-summary.mjs "Install dependencies" -- npm ci &
          pid_npm=$!
          wait $pid_compose || ec=1
          wait $pid_npm || ec=1
          exit $ec

      - name: Save infra Docker images for cache
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-infra
          # Only save images for services we start (redis, qdrant, postgres, keycloak); config --images includes app image which is not pulled
          IMAGES=$(docker compose -p kairos-mcp --env-file .env --profile fullstack config --format json | jq -r '.services | to_entries[] | select(.key | test("^(redis|qdrant|postgres|keycloak)$")) | .value.image')
          docker save -o .cache/docker-infra/images.tar $IMAGES

      - name: Cache infra Docker images
        uses: actions/cache/save@v5
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      # Keep artifact outside ./dist — integration tests expect ./dist/cli/index.js (see tests/integration/cli-commands-shared.ts).
      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: artifact-npm

      # E2E tests (e.g. cli-auth-browser-login) use Playwright chromium; separate runner from verify-ui.
      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache-integration
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and wait for infra (parallel)
        id: playwright-install-integration
        run: |
          set -euo pipefail
          ec=0
          node scripts/run-with-github-summary.mjs "Install Playwright browsers" -- npx playwright install chromium &
          pid_pw=$!
          bash scripts/wait-for-infra-ci.sh &
          pid_wait=$!
          wait $pid_pw || ec=1
          wait $pid_wait || ec=1
          exit $ec

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache-integration.outputs.cache-hit != 'true' && steps.playwright-install-integration.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Configure Keycloak realms and test user
        run: node scripts/run-with-github-summary.mjs "Configure Keycloak realms" -- python3 scripts/configure-keycloak-realms.py

      - name: Install package from tgz
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/run-with-github-summary.mjs "Install package from tgz" -- \
            npm install "./artifact-npm/debian777-kairos-mcp-${VERSION}.tgz"

      - name: Expose installed package dist for CLI tests
        run: |
          rm -rf dist
          cp -R node_modules/@debian777/kairos-mcp/dist ./dist

      - name: Start app (from installed package)
        env:
          HEALTH_CHECK_ATTEMPTS: 15
          KEYCLOAK_INTERNAL_URL: http://localhost:8080
          QDRANT_SNAPSHOT_DIR: var/snapshots
        run: |
          mkdir -p var/log var/snapshots
          npm run dev:start:installed > var/log/kairos.log 2>&1 &
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS}); do
            curl -sSf http://127.0.0.1:3300/health >/dev/null && break
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS} ] && exit 1
            sleep 2
          done

      - name: Run auth integration test
        run: npm run dev:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos.log ]; then ls -la var/log/kairos.log; cat var/log/kairos.log; else echo "No var/log/kairos.log"; fi

      - name: Upload kairos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-log
          path: var/log/kairos.log
          if-no-files-found: ignore

  verify-docker:
    name: Release-equivalent Docker image + Trivy
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist

      - name: Stage package.tgz and build release-equivalent image
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version package.json)
          mkdir -p .ci/docker
          cp "dist/debian777-kairos-mcp-${VERSION}.tgz" .ci/docker/package.tgz
          node scripts/run-with-github-summary.mjs "Docker build (release-equivalent)" -- \
            docker build --target runtime-ci --build-arg "PACKAGE_VERSION=${VERSION}" -t kairos-mcp:release-ci .

      - name: Trivy container scan (same policy as Release)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: kairos-mcp:release-ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH

  # Exact name may still be listed in branch protection from the pre-split workflow.
  integration-legacy-check-name:
    name: Infra + dev deploy + integration tests (AUTH on)
    needs: [verify-integration]
    runs-on: ubuntu-latest
    steps:
      - name: Delegate note
        run: echo "Real infra + npm tests run in verify-integration; this job satisfies legacy required-check name only."

  integration-pass:
    name: Integration workflow passed
    needs: [build, verify-ui, verify-integration, verify-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs
        run: |
          echo "build=${{ needs.build.result }} verify-ui=${{ needs.verify-ui.result }} verify-integration=${{ needs.verify-integration.result }} verify-docker=${{ needs.verify-docker.result }}"
          test "${{ needs.build.result }}" = "success"
          test "${{ needs.verify-ui.result }}" = "success"
          test "${{ needs.verify-integration.result }}" = "success"
          test "${{ needs.verify-docker.result }}" = "success"
          echo "All integration jobs passed."
