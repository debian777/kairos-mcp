# Integration workflow: build npm tgz, then verify in parallel (UI/static, npm+infra tests, Docker+Trivy).
# Secrets: OPENAI_API_KEY (from GitHub secrets). Infra/dev secrets are generated in verify-integration-primary each run.
# See .github/workflows/README.md for gh secret/variable setup.
#
# build-primary — Node 24 only (npm ci + pack); artifact npm-package-node24 (merge gate).
# build-advisory — single Node Current pin (26), continue-on-error (not in integration-pass needs).
# verify-ui-primary — static + UI tests, Node 24 only; parallel with build jobs (no tgz); merge gate.
# verify-ui-advisory — same steps on Node 26 (Current, advisory); continue-on-error; not in integration-pass needs.
# verify-integration-primary — Node 24 only; needs build-primary.
# verify-integration-advisory — Node 26; needs build-advisory; advisory only.
# verify-docker — release-equivalent image + Trivy; needs build-primary.
# integration-pass — gates only on Node-24 primary jobs + verify-docker (no advisory UI/build/integration).
name: Integration

on:
  pull_request:
    # Base branches: include ci/** so PRs into integration lines get the same gate as main.
    branches: [main, "ci/**"]
  merge_group:
  push:
    # Integration + Release tag (workflow_run) must run on beta/integration branches or beta never auto-tags.
    branches: [main, "ci/**"]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-primary:
    name: Build npm package (tgz, Node 24)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Sync autogenerated docs (commit back when allowed)
        env:
          IS_FORK: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork || 'false' }}
        run: |
          set -euo pipefail

          gen_paths=(
            src/resources/embedded-mcp-resources.ts
            skills/.system/kairos-install/references
          )

          if git diff --quiet -- "${gen_paths[@]}"; then
            exit 0
          fi

          can_push=false
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ] && [ "${IS_FORK}" = "false" ]; then
            can_push=true
          elif [ "${GITHUB_EVENT_NAME}" = "push" ] && echo "${GITHUB_REF}" | grep -qE '^refs/heads/ci/'; then
            can_push=true
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${gen_paths[@]}"
          if git diff --cached --quiet; then
            exit 0
          fi

          if [ "$can_push" != "true" ]; then
            echo "::error::Autogenerated docs changed during build. Commit the generated updates in these paths:"
            printf '%s\n' "${gen_paths[@]}"
            git diff -- "${gen_paths[@]}" || true
            exit 1
          fi

          last_msg="$(git log -1 --pretty=%B | tr -d '\r' || true)"
          if [ "$last_msg" = "chore: sync autogenerated docs" ]; then
            echo "::notice::Last commit is already a sync commit; skipping to avoid loops."
            exit 0
          fi

          git commit -m "chore: sync autogenerated docs"
          git push

      - name: Verify repository clean after build
        run: |
          set -euo pipefail
          allowed_re='^(dist/embed-docs/mem/|$)'
          dirty=$(git diff --name-only)
          unexpected=$(printf '%s\n' "$dirty" | grep -vE "$allowed_re" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::Repository changed during build outside allowed paths."
            echo "$unexpected"
            git diff
            exit 1
          fi

      - name: Test package install (clean tgz smoke)
        run: node scripts/ci-github-step-summary.mjs "Test package install (clean tgz smoke)" -- npm run test:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-node24
          path: dist/*.tgz

  build-advisory:
    name: Build npm package (tgz, Node 26, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Test package install (clean tgz smoke)
        run: node scripts/ci-github-step-summary.mjs "Test package install (clean tgz smoke)" -- npm run test:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-node26
          path: dist/*.tgz

  verify-ui-primary:
    name: Static checks + UI tests (Node 24)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Check versions (mem = package.json, skills = last stable)
        run: node scripts/ci-github-step-summary.mjs "Version check (mem & skills)" -- npm run version:check-skills

      - name: Lint skills (skills-ref)
        run: node scripts/ci-github-step-summary.mjs "Lint skills (skills-ref)" -- npm run lint:skills

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      # ESLint: matches `npm run lint` / Husky pre-commit — disabled in CI for now.
      # - name: ESLint
      #   run: node scripts/ci-github-step-summary.mjs "ESLint" -- npm run lint

      # Avoid re-downloading ~280MB Chromium/headless-shell/ffmpeg when lockfile unchanged
      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        id: playwright-install
        run: node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache.outputs.cache-hit != 'true' && steps.playwright-install.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: TypeScript, Knip, UI tests (parallel)
        run: node scripts/ci-parallel-checks.mjs

  verify-ui-advisory:
    name: Static checks + UI tests (Node 26, Current, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Check versions (mem = package.json, skills = last stable)
        run: node scripts/ci-github-step-summary.mjs "Version check (mem & skills)" -- npm run version:check-skills

      - name: Lint skills (skills-ref)
        run: node scripts/ci-github-step-summary.mjs "Lint skills (skills-ref)" -- npm run lint:skills

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      # ESLint: matches `npm run lint` / Husky pre-commit — disabled in CI for now.
      # - name: ESLint
      #   run: node scripts/ci-github-step-summary.mjs "ESLint" -- npm run lint

      # Node-version suffix so the advisory runner does not fight the Node 24 primary key
      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-node26-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        id: playwright-install
        run: node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache.outputs.cache-hit != 'true' && steps.playwright-install.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-node26-${{ hashFiles('package-lock.json') }}

      - name: TypeScript, Knip, UI tests (parallel)
        run: node scripts/ci-parallel-checks.mjs

  verify-integration-primary:
    name: Infra + dev deploy + integration tests (AUTH on, Node 24)
    needs: [build-primary]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "Generate .env (fullstack: infra + app + auth)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ci-github-step-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/deploy-generate-dev-secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Restore infra Docker image cache
        uses: actions/cache/restore@v5
        id: docker-infra-cache
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Load infra Docker images from cache
        if: steps.docker-infra-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-infra/images.tar

      # Infra + test-harness deps before the built tgz exists on this runner (overlaps with build job wall clock after this job starts).
      - name: Start Docker infra and npm ci (parallel)
        run: |
          set -euo pipefail
          ec=0
          docker compose -p kairos-mcp --env-file .env --profile fullstack up -d valkey qdrant postgres keycloak &
          pid_compose=$!
          node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci &
          pid_npm=$!
          wait $pid_compose || ec=1
          wait $pid_npm || ec=1
          exit $ec

      - name: Save infra Docker images for cache
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-infra
          # Only save images for services we start (valkey, qdrant, postgres, keycloak); config --images includes app image which is not pulled
          IMAGES=$(docker compose -p kairos-mcp --env-file .env --profile fullstack config --format json | jq -r '.services | to_entries[] | select(.key | test("^(valkey|qdrant|postgres|keycloak)$")) | .value.image')
          docker save -o .cache/docker-infra/images.tar $IMAGES

      - name: Cache infra Docker images
        uses: actions/cache/save@v5
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      # Keep artifact outside ./dist — integration tests expect ./dist/cli/index.js (see tests/integration/cli-commands-shared.ts).
      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-node24
          path: artifact-npm

      # E2E tests (e.g. cli-auth-browser-login) use Playwright chromium; separate runner from verify-ui-primary.
      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache-integration
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and wait for infra (parallel)
        id: playwright-install-integration
        run: |
          set -euo pipefail
          ec=0
          node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium &
          pid_pw=$!
          bash scripts/ci-wait-for-infra.sh &
          pid_wait=$!
          wait $pid_pw || ec=1
          wait $pid_wait || ec=1
          exit $ec

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache-integration.outputs.cache-hit != 'true' && steps.playwright-install-integration.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Configure Keycloak realms and test user
        run: node scripts/ci-github-step-summary.mjs "Configure Keycloak realms" -- python3 scripts/deploy-configure-keycloak-realms.py

      - name: Install package from tgz
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/ci-github-step-summary.mjs "Install package from tgz" -- \
            npm install "./artifact-npm/debian777-kairos-mcp-${VERSION}.tgz"

      - name: Expose installed package dist for CLI tests
        run: |
          rm -rf dist
          cp -R node_modules/@debian777/kairos-mcp/dist ./dist

      - name: Start app (from installed package)
        env:
          HEALTH_CHECK_ATTEMPTS: 15
          KEYCLOAK_INTERNAL_URL: http://localhost:8080
          QDRANT_SNAPSHOT_DIR: var/snapshots
        run: |
          mkdir -p var/log var/snapshots
          npm run dev:start:installed > var/log/kairos.log 2>&1 &
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS}); do
            curl -sSf http://127.0.0.1:3300/health >/dev/null && break
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS} ] && exit 1
            sleep 2
          done

      - name: Run auth integration test
        run: npm run dev:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos.log ]; then ls -la var/log/kairos.log; cat var/log/kairos.log; else echo "No var/log/kairos.log"; fi

      - name: Upload kairos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-log-node24
          path: var/log/kairos.log
          if-no-files-found: ignore

  verify-integration-advisory:
    name: Infra + dev deploy + integration tests (AUTH on, Node 26, Current, advisory)
    needs: [build-advisory]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: "Generate .env (fullstack: infra + app + auth)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ci-github-step-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/deploy-generate-dev-secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Restore infra Docker image cache
        uses: actions/cache/restore@v5
        id: docker-infra-cache
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Load infra Docker images from cache
        if: steps.docker-infra-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-infra/images.tar

      - name: Start Docker infra and npm ci (parallel)
        run: |
          set -euo pipefail
          ec=0
          docker compose -p kairos-mcp --env-file .env --profile fullstack up -d valkey qdrant postgres keycloak &
          pid_compose=$!
          node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci &
          pid_npm=$!
          wait $pid_compose || ec=1
          wait $pid_npm || ec=1
          exit $ec

      - name: Save infra Docker images for cache
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-infra
          IMAGES=$(docker compose -p kairos-mcp --env-file .env --profile fullstack config --format json | jq -r '.services | to_entries[] | select(.key | test("^(valkey|qdrant|postgres|keycloak)$")) | .value.image')
          docker save -o .cache/docker-infra/images.tar $IMAGES

      - name: Cache infra Docker images
        uses: actions/cache/save@v5
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-node26
          path: artifact-npm

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache-integration
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and wait for infra (parallel)
        id: playwright-install-integration
        run: |
          set -euo pipefail
          ec=0
          node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium &
          pid_pw=$!
          bash scripts/ci-wait-for-infra.sh &
          pid_wait=$!
          wait $pid_pw || ec=1
          wait $pid_wait || ec=1
          exit $ec

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache-integration.outputs.cache-hit != 'true' && steps.playwright-install-integration.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Configure Keycloak realms and test user
        run: node scripts/ci-github-step-summary.mjs "Configure Keycloak realms" -- python3 scripts/deploy-configure-keycloak-realms.py

      - name: Install package from tgz
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/ci-github-step-summary.mjs "Install package from tgz" -- \
            npm install "./artifact-npm/debian777-kairos-mcp-${VERSION}.tgz"

      - name: Expose installed package dist for CLI tests
        run: |
          rm -rf dist
          cp -R node_modules/@debian777/kairos-mcp/dist ./dist

      - name: Start app (from installed package)
        env:
          HEALTH_CHECK_ATTEMPTS: 15
          KEYCLOAK_INTERNAL_URL: http://localhost:8080
          QDRANT_SNAPSHOT_DIR: var/snapshots
        run: |
          mkdir -p var/log var/snapshots
          npm run dev:start:installed > var/log/kairos.log 2>&1 &
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS}); do
            curl -sSf http://127.0.0.1:3300/health >/dev/null && break
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS} ] && exit 1
            sleep 2
          done

      - name: Run auth integration test
        run: npm run dev:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos.log ]; then ls -la var/log/kairos.log; cat var/log/kairos.log; else echo "No var/log/kairos.log"; fi

      - name: Upload kairos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-log-node26
          path: var/log/kairos.log
          if-no-files-found: ignore

  verify-docker:
    # Docker image FROM is single-Node (24-alpine) — verify-docker is intentionally non-matrix and
    # downloads the Node 24 tgz only.
    name: Release-equivalent Docker image + Trivy
    needs: [build-primary]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Dependabot PRs do not receive DOCKER_* secrets; login with empty creds fails the step.
      - name: Login to Docker Hub
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.actor != 'dependabot[bot]'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-node24
          path: dist

      - name: Stage package.tgz and build release-equivalent image
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version package.json)
          mkdir -p .ci/docker
          cp "dist/debian777-kairos-mcp-${VERSION}.tgz" .ci/docker/package.tgz
          node scripts/ci-github-step-summary.mjs "Docker build (release-equivalent)" -- \
            docker build --target runtime-ci --build-arg "PACKAGE_VERSION=${VERSION}" -t kairos-mcp:release-ci .

      - name: Trivy container scan (same policy as Release)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: kairos-mcp:release-ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  # Merge gate: Node 24 primary jobs only (build, UI/static, integration, Docker). Node 26
  # advisory jobs (build-advisory, verify-ui-advisory, verify-integration-advisory) are omitted
  # from needs: so they cannot fail this check or block PR merge.
  integration-pass:
    name: Integration workflow passed
    needs: [build-primary, verify-ui-primary, verify-integration-primary, verify-docker]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs
        run: |
          echo "build-primary=${{ needs.build-primary.result }} verify-ui-primary=${{ needs.verify-ui-primary.result }} verify-integration-primary=${{ needs.verify-integration-primary.result }} verify-docker=${{ needs.verify-docker.result }}"
          test "${{ needs.build-primary.result }}" = "success"
          test "${{ needs.verify-ui-primary.result }}" = "success"
          test "${{ needs.verify-integration-primary.result }}" = "success"
          test "${{ needs.verify-docker.result }}" = "success"
          echo "All integration jobs passed."
