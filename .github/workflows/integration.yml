# Integration: (1) build+pack+artifact, (2) integration test from artifact, (3) publish npm+docker on tag/manual.
# Secrets: OPENAI_API_KEY (optional). See .github/workflows/README.md for workflow design.
name: Integration

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Run publish job (npm + docker) after integration'
        required: false
        default: false
        type: boolean
      force:
        description: 'Allow overwriting existing npm version (--force). Use only until workflow is stable.'
        required: false
        default: false
        type: boolean

jobs:
  build:
    name: Build + pack + artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Sync version from tag
        if: github.ref != '' && startsWith(github.ref, 'refs/tags/v')
        run: npm version ${GITHUB_REF_NAME#v} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Knip
        run: npm run knip

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: kairos-*.tgz

  integration:
    name: Integration test from artifact
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Generate .env and .env.dev
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/generate_dev_secrets.py

      - name: Verify .env and .env.dev exist
        run: ls -la .env .env.dev

      - name: Restore infra Docker image cache
        uses: actions/cache/restore@v4
        id: docker-infra-cache
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Load infra Docker images from cache
        if: steps.docker-infra-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-infra/images.tar

      - name: Start Docker infra
        run: docker compose -p kairos-mcp --env-file .env.dev --profile infra up -d

      - name: Save infra Docker images for cache
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-infra
          docker save -o .cache/docker-infra/images.tar \
            redis:7-alpine \
            qdrant/qdrant:latest \
            postgres:16 \
            quay.io/keycloak/keycloak:26.5.4

      - name: Cache infra Docker images
        uses: actions/cache/save@v4
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            docker compose -p kairos-mcp --env-file .env.dev --profile infra exec -T redis redis-cli ping 2>/dev/null | grep -q PONG && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sSf http://127.0.0.1:6333/healthz >/dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose -p kairos-mcp --env-file .env.dev --profile infra exec -T postgres pg_isready -U keycloak -d keycloak 2>/dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 90); do
            curl -sSf -o /dev/null http://localhost:9000/health/ready && break
            [ $i -eq 90 ] && exit 1
            sleep 2
          done

      - name: Configure Keycloak realms and test user
        run: python3 scripts/configure-keycloak-realms.py

      - name: Install dependencies for tests
        run: npm ci

      - name: Start app from artifact and run integration tests
        env:
          HEALTH_CHECK_ATTEMPTS: 20
        run: |
          set -a
          [ -f .env.dev ] && source .env.dev
          set +a
          export PORT=3300
          npm install ./kairos-*.tgz
          mkdir -p var/logs run-app
          cp kairos-*.tgz run-app/
          cd run-app
          npm init -y
          npm install ./kairos-*.tgz
          echo "Starting app from artifact..."
          ( set -a; [ -f ../.env.dev ] && source ../.env.dev; set +a; export PORT=3300; node node_modules/kairos/dist/index.js ) > ../var/logs/kairos-dev.log 2>&1 &
          APP_PID=$!
          cd ..
          echo "Waiting for app at http://localhost:3300/health (up to ${HEALTH_CHECK_ATTEMPTS:-20} attempts)..."
          sleep 5
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS:-20}); do
            if curl -sSf -o /dev/null http://localhost:3300/health; then
              echo "App healthy after $i attempt(s)."
              break
            fi
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS:-20} ] && { echo "App failed to become healthy. Last 80 lines of var/logs/kairos-dev.log:"; tail -80 var/logs/kairos-dev.log; kill $APP_PID 2>/dev/null || true; exit 1; }
            sleep 2
          done
          echo "Running integration tests..."
          MCP_URL="http://localhost:3300/mcp" NODE_OPTIONS='--experimental-vm-modules' npx jest --silent --runInBand --detectOpenHandles --testTimeout=30000 --testPathPatterns "tests/integration/"
          EXIT=$?
          kill $APP_PID 2>/dev/null || true
          exit $EXIT

      - name: Upload kairos-dev log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-dev-log
          path: var/logs
          if-no-files-found: ignore

  publish:
    name: Publish npm + Docker
    needs: integration
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download npm package artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-package

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Get version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.force }}" == "true" ]]; then
            npm publish ./kairos-*.tgz --access public --force
          else
            npm publish ./kairos-*.tgz --access public
          fi

      - name: Wait for npm package to be available
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for kairos@$VERSION to be available on registry..."
          SLEEP=15
          ATTEMPTS=24
          INTERVAL=10
          sleep $SLEEP
          for i in $(seq 1 $ATTEMPTS); do
            if npm view "kairos@$VERSION" version --registry https://registry.npmjs.org 2>/dev/null | grep -qx "$VERSION"; then
              echo "Package kairos@$VERSION is available after $((SLEEP + (i - 1) * INTERVAL))s."
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: not yet available, waiting ${INTERVAL}s..."
            [ $i -eq $ATTEMPTS ] && { echo "Timeout: kairos@$VERSION not available after $((SLEEP + ATTEMPTS * INTERVAL))s"; exit 1; }
            sleep $INTERVAL
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KAIROS_VERSION=${{ steps.version.outputs.version }}
          tags: |
            debian777/kairos-mcp:latest
            debian777/kairos-mcp:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
