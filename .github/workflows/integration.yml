# Integration tests with Docker infra (Redis, Qdrant, Postgres, Keycloak). AUTH enabled.
# Runs on PR and push to main so main stays green; also on tag push so the released ref is re-verified.
# Secrets: OPENAI_API_KEY (from GitHub secrets). Infra/dev secrets are generated by the script each run.
# See .github/workflows/README.md for gh secret/variable setup.
name: Integration

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  integration:
    name: Infra + dev deploy + integration tests (AUTH on)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Check versions (mem = package.json, skills = last stable)
        run: npm run version:check-skills

      - name: Lint skills (skills-ref)
        run: python3 scripts/lint_skills.py

      - name: "Generate .env (fullstack: infra + app + auth)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python3 scripts/generate_dev_secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Restore infra Docker image cache
        uses: actions/cache/restore@v5
        id: docker-infra-cache
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Load infra Docker images from cache
        if: steps.docker-infra-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-infra/images.tar

      - name: Start Docker infra (no app container; app runs via npm)
        run: docker compose -p kairos-mcp --env-file .env --profile fullstack up -d redis qdrant postgres keycloak

      - name: Save infra Docker images for cache
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-infra
          # Only save images for services we start (redis, qdrant, postgres, keycloak); config --images includes app image which is not pulled
          IMAGES=$(docker compose -p kairos-mcp --env-file .env --profile fullstack config --format json | jq -r '.services | to_entries[] | select(.key | test("^(redis|qdrant|postgres|keycloak)$")) | .value.image')
          docker save -o .cache/docker-infra/images.tar $IMAGES

      - name: Cache infra Docker images
        uses: actions/cache/save@v5
        if: steps.docker-infra-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-infra
          key: infra-docker-${{ hashFiles('compose.yaml') }}

      - name: Wait for Redis
        run: |
          for i in $(seq 1 30); do
            docker compose -p kairos-mcp --env-file .env --profile fullstack exec -T redis redis-cli ping 2>/dev/null | grep -q PONG && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            curl -sSf http://127.0.0.1:6333/healthz >/dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            docker compose -p kairos-mcp --env-file .env --profile fullstack exec -T postgres pg_isready -U keycloak -d keycloak 2>/dev/null && break
            [ $i -eq 30 ] && exit 1
            sleep 2
          done

      - name: Wait for Keycloak
        run: |
          for i in $(seq 1 90); do
            curl -sSf -o /dev/null http://localhost:9000/health/ready && break
            [ $i -eq 90 ] && exit 1
            sleep 2
          done

      - name: Configure Keycloak realms and test user
        run: python3 scripts/configure-keycloak-realms.py

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit
        # Fail fast on TS errors (e.g. duplicate function); full build runs later.

      - name: Knip (compliance)
        run: npm run knip

      - name: Run UI tests
        run: npm run test:ui

      - name: Build package (tgz)
        run: npm run build:tgz

      - name: Install package from tgz
        run: npm install ./dist/debian777-kairos-mcp-$(node -p "require('./package.json').version").tgz

      - name: Start app (from installed package)
        env:
          HEALTH_CHECK_ATTEMPTS: 15
          # App runs on host; use localhost for JWKS (keycloak:8080 only resolves inside Docker)
          KEYCLOAK_INTERNAL_URL: http://localhost:8080
          # Writable snapshot dir so POST /api/snapshot returns 200/502, not 500
          QDRANT_SNAPSHOT_DIR: var/snapshots
        run: |
          mkdir -p var/log var/snapshots
          npm run dev:start:installed > var/log/kairos.log 2>&1 &
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS}); do
            curl -sSf http://127.0.0.1:3300/health >/dev/null && break
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS} ] && exit 1
            sleep 2
          done

      - name: Run auth integration test
        run: npm run dev:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos.log ]; then ls -la var/log/kairos.log; cat var/log/kairos.log; else echo "No var/log/kairos.log"; fi

      - name: Upload kairos log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-log
          path: var/log/kairos.log
          if-no-files-found: ignore
