name: Integration Stdio

on:
  pull_request:
    branches: [main]
  merge_group:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# Stdio-mode integration tests (ENV=dev_stdio).
# Path filtering (Pattern B): the `changes` job inspects modified paths and sets `code=true` only when
# files that affect build/test outcomes are touched. Heavy jobs gate on `needs.changes.outputs.code == 'true'`,
# so docs-only / wiki-only / helm-only PRs skip the expensive work while `integration-stdio-pass`
# still reports a successful status (required-check compatible).
#
# Forced run (code=true regardless of paths) for: workflow_dispatch, merge_group, and tag pushes.
# PR / push-to-main use the path filter.

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.combine.outputs.code }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@v4
        with:
          # Files that can affect build, lint, or stdio-mode integration outcomes.
          # Keep in sync with integration.yml and integration-simple.yml when updating.
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - 'skills/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - 'jest.config.js'
              - 'vitest.config.ts'
              - 'vite.config.ts'
              - 'postcss.config.js'
              - 'eslint.config.cjs'
              - 'eslint/**'
              - 'knip.config.ts'
              - 'Dockerfile*'
              - 'compose.yaml'
              - '.env.dev_stdio'
              - '.github/workflows/integration-stdio.yml'

      - name: Combine with forced-run events
        id: combine
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF: ${{ github.ref }}
          FILTER_CODE: ${{ steps.filter.outputs.code }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ] \
             || [ "$EVENT_NAME" = "merge_group" ] \
             || [[ "$REF" == refs/tags/* ]] \
             || [[ "$REF" == refs/heads/ci/* ]]; then
            echo "Forcing code=true for event=$EVENT_NAME ref=$REF"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "Filter result: code=$FILTER_CODE"
            echo "code=$FILTER_CODE" >> "$GITHUB_OUTPUT"
          fi

  build-primary:
    name: Build npm package (tgz, Node 24)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-stdio-node24
          path: dist/*.tgz

  build-advisory:
    name: Build npm package (advisory, Node 26)
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-stdio-node26
          path: dist/*.tgz

  verify-integration-stdio-primary:
    name: Infra + dev deploy + integration tests (STDIO mode, Node 24)
    needs: [changes, build-primary]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "Generate .env (base vars, overridden for stdio mode)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ci-github-step-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/deploy-generate-dev-secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Apply stdio profile overrides
        run: |
          # Source stdio-specific env vars (SERVER_PORT, TRANSPORT, etc.)
          set -a
          [ -f .env.dev_stdio ] && . ./.env.dev_stdio
          set +a
          # Append non-duplicate overrides to .env
          while IFS= read -r line; do
            key="${line%%=*}"
            if [ -n "$key" ] && ! grep -q "^${key}=" .env 2>/dev/null; then
              echo "$line" >> .env
            fi
          done < <(grep -v '^#' .env.dev_stdio 2>/dev/null | grep '=')

      - name: Start Qdrant (binary) and npm ci (parallel)
        run: |
          set -euo pipefail
          ec=0
          QDRANT_HTTP_PORT=7633 QDRANT_GRPC_PORT=7634 npm run qdrant:binary:start &
          pid_qdrant=$!
          node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci &
          pid_npm=$!
          wait $pid_qdrant || ec=1
          wait $pid_npm || ec=1
          exit $ec

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-stdio-node24
          path: artifact-npm

      - name: Restore Qdrant test snapshot cache
        uses: actions/cache/restore@v5
        id: qdrant-snapshot-cache
        with:
          path: |
            .local/qdrant-snapshot/kairos_ci.snapshot
            .local/qdrant-snapshot/kairos_ci_traces.snapshot
          key: ${{ runner.os }}-qdrant-snapshot-${{ hashFiles('scripts/seed-test-snapshot.sh', 'scripts/import-test-snapshot.sh', 'tests/test-data/AI_CODING_RULES.md') }}
          restore-keys: |
            ${{ runner.os }}-qdrant-snapshot-

      - name: Restore Playwright browsers Cache
        uses: actions/cache/restore@v5
        id: playwright-cache-stdio
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and wait for Qdrant (parallel)
        id: playwright-install-stdio
        run: |
          set -euo pipefail
          ec=0
          node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium &
          pid_pw=$!
          for i in $(seq 1 30); do
            curl -sSf http://127.0.0.1:7633/healthz >/dev/null && break
            [ "$i" -eq 30 ] && ec=1
            sleep 2
          done &
          pid_wait=$!
          wait $pid_pw || ec=1
          wait $pid_wait || ec=1
          exit $ec

      - name: Save Playwright browsers Cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache-stdio.outputs.cache-hit != 'true' && steps.playwright-install-stdio.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install package from tgz
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/ci-github-step-summary.mjs "Install package from tgz" -- \
            npm install "./artifact-npm/debian777-kairos-mcp-${VERSION}.tgz"

      - name: Expose installed package dist for CLI tests
        run: |
          rm -rf dist
          cp -R node_modules/@debian777/kairos-mcp/dist ./dist

      - name: Run stdio-mode integration tests
        env:
          ENV: dev_stdio
          QDRANT_COLLECTION: kairos_simple_ci
          CI: "true"
        run: |
          # Stdio mode: no HTTP server, tests spawn stdio subprocess internally.
          # deploy-run-env.sh test skips health checks and Playwright for stdio.
          # Do NOT run dev_stdio:deploy (includes knip which flags subpath imports as unused).
          # The tgz is already installed; dev_stdio:test will start the server internally.
          npm run dev_stdio:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos stdio log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos-stdio.log ]; then ls -la var/log/kairos-stdio.log; cat var/log/kairos-stdio.log; else echo "No var/log/kairos-stdio.log"; fi

      - name: Upload kairos stdio log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-stdio-log-node24
          path: var/log/kairos-stdio.log
          if-no-files-found: ignore

      - name: Stop Qdrant (binary)
        if: always()
        run: npm run qdrant:binary:stop

  # Gates only on Node 24 jobs; advisory Node 26 job is not in needs.
  # When `changes.code == 'false'` (docs-only / wiki / helm PR), the heavy jobs are skipped
  # and this gate passes immediately so required status checks still report success.
  integration-stdio-pass:
    name: Integration stdio workflow passed
    needs: [changes, build-primary, verify-integration-stdio-primary]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require all jobs
        env:
          CHANGES_CODE: ${{ needs.changes.outputs.code }}
          BUILD_PRIMARY: ${{ needs.build-primary.result }}
          VERIFY_PRIMARY: ${{ needs.verify-integration-stdio-primary.result }}
          CHANGES_RESULT: ${{ needs.changes.result }}
        run: |
          set -euo pipefail
          echo "changes.result=$CHANGES_RESULT changes.code=$CHANGES_CODE"
          echo "build-primary=$BUILD_PRIMARY verify-integration-stdio-primary=$VERIFY_PRIMARY"

          # Fail fast if the changes job itself broke.
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "::error::changes job did not succeed (result=$CHANGES_RESULT)"
            exit 1
          fi

          if [ "$CHANGES_CODE" != "true" ]; then
            echo "No relevant code changes detected — skipping stdio integration is OK."
            exit 0
          fi

          test "$BUILD_PRIMARY" = "success"
          test "$VERIFY_PRIMARY" = "success"
          echo "All stdio integration jobs pass."
