# When a merge to main changes package.json version, or when a branch has a beta version,
# create and push the tag, then trigger the Release workflow via workflow_dispatch.
# - Main: full releases (vX.Y.Z) and pre-releases (vX.Y.Z-pre.N) only when version > latest tag.
# - Any other branch (or manual run): beta only (version must contain -beta.); tag if not already present.
# Tag pushes from Actions do not trigger other workflows, so we dispatch Release manually.
# Requires branch protection to allow this workflow to push tags.
name: Release tag on version bump

concurrency:
  group: release-tag-on-version-bump-${{ github.repository }}
  cancel-in-progress: false

on:
  workflow_run:
    workflows: [Integration, Integration Simple]
    types: [completed]
    branches: [main, "ci/**"]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to release (branch or SHA). Beta only. Example: feat/seamless-kairos-opus-4.6-max'
        required: true

jobs:
  tag-release:
    name: Tag if version bumped
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    permissions:
      contents: write  # push tag
      actions: write  # trigger Release workflow
      checks: read

    steps:
      - name: Require Integration and Integration Simple success on same SHA
        if: github.event_name == 'workflow_run'
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          attempts=10
          sleep_seconds=15
          for attempt in $(seq 1 "$attempts"); do
            json=$(curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/runs?head_sha=${HEAD_SHA}&per_page=100")

            integration=$(printf '%s' "$json" | jq -r '.workflow_runs[] | select(.name=="Integration" and .head_branch=="'"${HEAD_BRANCH}"'") | .conclusion' | head -n1)
            simple=$(printf '%s' "$json" | jq -r '.workflow_runs[] | select(.name=="Integration Simple" and .head_branch=="'"${HEAD_BRANCH}"'") | .conclusion' | head -n1)

            echo "Attempt ${attempt}/${attempts}: Integration=${integration:-missing}, Integration Simple=${simple:-missing}"

            if [ "${integration:-}" = "success" ] && [ "${simple:-}" = "success" ]; then
              exit 0
            fi

            if [ "${integration:-}" = "failure" ] || [ "${integration:-}" = "cancelled" ] || [ "${simple:-}" = "failure" ] || [ "${simple:-}" = "cancelled" ]; then
              echo "Required integration workflow failed/cancelled on HEAD SHA ${HEAD_SHA}"
              exit 1
            fi

            if [ "$attempt" -lt "$attempts" ]; then
              sleep "$sleep_seconds"
            fi
          done

          echo "Timed out waiting for Integration and Integration Simple success on SHA ${HEAD_SHA}"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"

      - name: Get package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Set branch and beta flags
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "is_main=false" >> "$GITHUB_OUTPUT"
          else
            branch="${{ github.event.workflow_run.head_branch }}"
            if [ "$branch" = "main" ]; then echo "is_main=true" >> "$GITHUB_OUTPUT"; else echo "is_main=false" >> "$GITHUB_OUTPUT"; fi
          fi
          pkg="${{ steps.pkg.outputs.version }}"
          if echo "$pkg" | grep -q '\-beta\.'; then echo "is_beta=true" >> "$GITHUB_OUTPUT"; else echo "is_beta=false" >> "$GITHUB_OUTPUT"; fi

      - name: Get latest stable tag (by version in repo)
        id: tag
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
          echo "tag=${latest}" >> "$GITHUB_OUTPUT"
          echo "version=${latest#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag if version increased
        id: push_tag
        run: |
          pkg="${{ steps.pkg.outputs.version }}"
          latest="${{ steps.tag.outputs.version }}"
          is_main="${{ steps.flags.outputs.is_main }}"
          is_beta="${{ steps.flags.outputs.is_beta }}"
          tag_name="v${pkg}"

          do_tag=false
          if [ "$is_main" = "true" ]; then
            if git rev-parse "$tag_name" >/dev/null 2>&1; then
              :
            elif git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
              :
            else
              higher=$(printf '%s\n' "$latest" "$pkg" | sort -V | tail -n1)
              if [ "$higher" = "$pkg" ] && [ "$latest" != "$pkg" ]; then do_tag=true; fi
            fi
          else
            if [ "$is_beta" = "true" ]; then
              if ! git rev-parse "$tag_name" >/dev/null 2>&1 \
                && ! git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; then
                do_tag=true
              fi
            fi
          fi

          if [ "$do_tag" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$tag_name"
            git push origin "$tag_name"
            echo "tag_created=true" >> "$GITHUB_OUTPUT"
            echo "version=${pkg}" >> "$GITHUB_OUTPUT"
            echo "Created and pushed tag $tag_name"
          else
            echo "tag_created=false" >> "$GITHUB_OUTPUT"
            echo "version=" >> "$GITHUB_OUTPUT"
            if [ "$is_main" != "true" ] && [ "$is_beta" != "true" ]; then
              echo "Skipped: non-main branches only allow beta versions (version must contain -beta.)"
            elif [ "$is_main" = "true" ] && { git rev-parse "$tag_name" >/dev/null 2>&1 \
              || git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; }; then
              echo "Skipped: tag $tag_name already exists (local or origin)"
            elif [ "$is_main" != "true" ] && [ "$is_beta" = "true" ] \
              && { git rev-parse "$tag_name" >/dev/null 2>&1 \
              || git ls-remote --exit-code --tags origin "refs/tags/${tag_name}" >/dev/null 2>&1; }; then
              echo "Skipped: tag $tag_name already exists"
            else
              echo "No tag needed (package version $pkg not greater than latest $latest)"
            fi
          fi

      - name: Trigger Release workflow
        if: steps.push_tag.outputs.tag_created == 'true'
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="v${{ steps.push_tag.outputs.version }}"
          dispatch_release() {
            curl -sSf -X POST \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/release.yml/dispatches" \
              -d "{\"ref\":\"main\",\"inputs\":{\"ref\":\"$tag\"}}"
          }

          latest_release_run_id() {
            curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/release.yml/runs?event=workflow_dispatch&head_sha=${GITHUB_SHA}&per_page=5" \
              | jq -r '.workflow_runs[0].id // empty'
          }

          wait_for_release_run() {
            local expected_run_id="$1"
            local tries=12
            local wait_seconds=5
            for try in $(seq 1 "$tries"); do
              run_json=$(curl -sSf -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/${REPO}/actions/runs/${expected_run_id}")
              run_status=$(printf '%s' "$run_json" | jq -r '.status')
              run_conclusion=$(printf '%s' "$run_json" | jq -r '.conclusion // "null"')
              echo "Release run ${expected_run_id}: status=${run_status}, conclusion=${run_conclusion}"
              if [ "$run_status" = "completed" ]; then
                if [ "$run_conclusion" = "startup_failure" ]; then
                  return 10
                fi
                return 0
              fi
              sleep "$wait_seconds"
            done
            return 0
          }

          dispatch_release
          echo "Triggered Release workflow for $tag"

          release_run_id=""
          for lookup in $(seq 1 6); do
            release_run_id="$(latest_release_run_id)"
            if [ -n "$release_run_id" ]; then
              break
            fi
            sleep 3
          done

          if [ -z "$release_run_id" ]; then
            echo "Could not resolve release run id after dispatch; leaving first trigger as-is."
            exit 0
          fi

          if wait_for_release_run "$release_run_id"; then
            exit 0
          fi

          echo "Release run ${release_run_id} ended with startup_failure; dispatching one retry."
          dispatch_release
          echo "Triggered retry Release workflow for $tag"

    outputs:
      tag_created: ${{ steps.push_tag.outputs.tag_created }}
      version: ${{ steps.push_tag.outputs.version }}
