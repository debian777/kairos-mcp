name: Publish Docker Image

on:
  workflow_run:
    workflows: ["Publish npm Package"]
    types: [completed]
  workflow_dispatch:

jobs:
  publish:
    # Only run when manually dispatched, or when npm publish was triggered by a tag push (not manual npm run)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && startsWith(github.event.workflow_run.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Extract version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            git fetch origin --tags 2>/dev/null || true
            TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || true)
            if [[ -n "$TAG" ]]; then
              VERSION="${TAG#v}"
            else
              VERSION="$(node -p "require('./package.json').version")"
            fi
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # Detect prerelease (any semver prerelease starting with a letter)
          if echo "$VERSION" | grep -qE '\-[a-zA-Z0-9]'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute Docker tags
        id: docker_tags
        run: |
          TAGS="debian777/kairos-mcp:${{ steps.version.outputs.version }}"
          if [[ "${{ steps.version.outputs.is_prerelease }}" != "true" ]]; then
            TAGS="${TAGS}"$'\n'"debian777/kairos-mcp:latest"
          fi
          { echo "tags<<EOF"; echo "$TAGS"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KAIROS_VERSION=${{ steps.version.outputs.version }}
          tags: ${{ steps.docker_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
