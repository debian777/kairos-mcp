name: Publish Docker Image

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and push (e.g. v3.0.1)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Resolve tag name
        id: tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for npm package to be available
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Waiting for @debian777/kairos@${VERSION} on npm..."
          for i in $(seq 1 20); do
            if npm view "@debian777/kairos@${VERSION}" version 2>/dev/null | grep -q "${VERSION}"; then
              echo "Package available."
              exit 0
            fi
            echo "  attempt ${i}/20 — sleeping 30s"
            sleep 30
          done
          echo "Timed out waiting for npm package." && exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            KAIROS_VERSION=${{ steps.version.outputs.version }}
          tags: |
            debian777/kairos-mcp:latest
            debian777/kairos-mcp:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
