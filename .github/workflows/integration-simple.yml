name: Integration Simple

on:
  pull_request:
    branches: [main, "ci/**"]
  merge_group:
  push:
    branches: [main, "ci/**"]
    tags:
      - 'v*.*.*'
  workflow_dispatch:

# No static/UI job here: TypeScript, Knip, and UI tests run in Integration (integration.yml) as
# verify-ui-primary / verify-ui-advisory (Node 26 Current, advisory). This workflow only builds tgz and runs simple-mode integration.

jobs:
  build-primary:
    name: Build npm package (tgz, Node 24)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Commit and push generated files
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        run: |
          set -euo pipefail
          if git diff --quiet -- src/resources/embedded-mcp-resources.ts skills/.system/kairos-install/references; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/resources/embedded-mcp-resources.ts skills/.system/kairos-install/references
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: sync embedded docs and install refs"
          git push

      - name: Verify repository clean after build
        run: |
          set -euo pipefail
          allowed_re='^(dist/embed-docs/mem/|$)'
          dirty=$(git diff --name-only)
          unexpected=$(printf '%s\n' "$dirty" | grep -vE "$allowed_re" || true)
          if [ -n "$unexpected" ]; then
            echo "::error::Repository changed during build outside allowed paths."
            echo "$unexpected"
            git diff
            exit 1
          fi

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-simple-node24
          path: dist/*.tgz

  build-advisory:
    name: Build npm package (tgz, Node 26, Current, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: Install dependencies
        run: node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci

      - name: Build package (tgz)
        run: node scripts/ci-github-step-summary.mjs "Build package (tgz)" -- npm run build:tgz

      - name: Upload npm package artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package-simple-node26
          path: dist/*.tgz

  verify-integration-simple-primary:
    name: Infra + dev deploy + integration tests (SIMPLE mode, Node 24)
    needs: [build-primary]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: "Generate .env (base vars, overridden for simple mode)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ci-github-step-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/deploy-generate-dev-secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Apply simple profile overrides
        run: cat .env.dev_simple >> .env

      - name: Restore Qdrant Docker image cache
        uses: actions/cache/restore@v5
        id: docker-qdrant-cache
        with:
          path: .cache/docker-qdrant
          key: qdrant-docker-${{ hashFiles('compose.yaml') }}

      - name: Load Qdrant Docker image from cache
        if: steps.docker-qdrant-cache.outputs.cache-hit == 'true'
        run: docker load -i .cache/docker-qdrant/images.tar

      - name: Start Qdrant and npm ci (parallel)
        run: |
          set -euo pipefail
          ec=0
          docker compose -p kairos-mcp-simple --env-file .env up -d qdrant &
          pid_compose=$!
          node scripts/ci-github-step-summary.mjs "Install dependencies" -- npm ci &
          pid_npm=$!
          wait $pid_compose || ec=1
          wait $pid_npm || ec=1
          exit $ec

      - name: Save Qdrant Docker image for cache
        if: steps.docker-qdrant-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .cache/docker-qdrant
          IMAGE=$(docker compose -p kairos-mcp-simple --env-file .env config --format json | jq -r '.services.qdrant.image')
          docker save -o .cache/docker-qdrant/images.tar "$IMAGE"

      - name: Cache Qdrant Docker image
        uses: actions/cache/save@v5
        if: steps.docker-qdrant-cache.outputs.cache-hit != 'true'
        with:
          path: .cache/docker-qdrant
          key: qdrant-docker-${{ hashFiles('compose.yaml') }}

      - name: Download npm package artifact
        uses: actions/download-artifact@v8
        with:
          name: npm-package-simple-node24
          path: artifact-npm

      - name: Restore Playwright browsers cache
        uses: actions/cache/restore@v5
        id: playwright-cache-simple
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers and wait for Qdrant (parallel)
        id: playwright-install-simple
        run: |
          set -euo pipefail
          ec=0
          node scripts/ci-github-step-summary.mjs "Install Playwright browsers" -- npx playwright install chromium &
          pid_pw=$!
          for i in $(seq 1 30); do
            curl -sSf http://127.0.0.1:6333/healthz >/dev/null && break
            [ "$i" -eq 30 ] && ec=1
            sleep 2
          done &
          pid_wait=$!
          wait $pid_pw || ec=1
          wait $pid_wait || ec=1
          exit $ec

      - name: Save Playwright browsers cache
        uses: actions/cache/save@v5
        if: steps.playwright-cache-simple.outputs.cache-hit != 'true' && steps.playwright-install-simple.outcome == 'success'
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-ms-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install package from tgz
        run: |
          VERSION=$(node -p "require('./package.json').version")
          node scripts/ci-github-step-summary.mjs "Install package from tgz" -- \
            npm install "./artifact-npm/debian777-kairos-mcp-${VERSION}.tgz"

      - name: Expose installed package dist for CLI tests
        run: |
          rm -rf dist
          cp -R node_modules/@debian777/kairos-mcp/dist ./dist

      - name: Start app (from installed package, simple mode)
        env:
          HEALTH_CHECK_ATTEMPTS: 15
          ENV: dev_simple
          QDRANT_SNAPSHOT_DIR: var/snapshots
        run: |
          mkdir -p var/log var/snapshots
          npm run dev:start:installed > var/log/kairos-simple.log 2>&1 &
          for i in $(seq 1 ${HEALTH_CHECK_ATTEMPTS}); do
            curl -sSf http://127.0.0.1:4300/health >/dev/null && break
            [ $i -eq ${HEALTH_CHECK_ATTEMPTS} ] && exit 1
            sleep 2
          done

      - name: Run simple-mode integration tests
        env:
          ENV: dev_simple
        run: npm run dev_simple:test

      - name: Show test failure
        if: failure()
        run: |
          echo "--- Last test report (tail) ---"
          latest=$(ls -t reports/tests/*.log 2>/dev/null | head -n1)
          if [ -n "$latest" ]; then
            tail -n 200 "$latest"
          else
            echo "No reports/tests/*.log found"
          fi

      - name: Upload kairos simple log - check
        if: always() && failure()
        run: |
          pwd
          ls -la var/log 2>/dev/null || true
          if [ -f var/log/kairos-simple.log ]; then ls -la var/log/kairos-simple.log; cat var/log/kairos-simple.log; else echo "No var/log/kairos-simple.log"; fi

      - name: Upload kairos simple log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kairos-simple-log-node24
          path: var/log/kairos-simple.log
          if-no-files-found: ignore

  verify-integration-simple-advisory:
    name: Infra + dev deploy + integration tests (SIMPLE mode, Node 26, Current, advisory)
    needs: [build-advisory]
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "26"
          cache: "npm"

      - name: "Generate .env (base vars, overridden for simple mode)"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/ci-github-step-summary.mjs "Generate .env (dev secrets)" -- python3 scripts/deploy-generate-dev-secrets.py

      - name: Verify .env exists
        run: ls -la .env

      - name: Apply simple profile overrides
        run: cat .env.dev_simple >> .env

      - name: Restore Qdrant Docker image cache
        uses: actions/cache/restore@v5
        id: docker-qdrant-cache
        with:
          path: .cache/docker-qdrant
