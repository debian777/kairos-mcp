# Single release pipeline: on version tag push, publish npm then Docker.
# Only acceptable final output: npm package in registry, Docker image on Docker Hub and Quay.
# Triggered by release-tag-on-version-bump after merge of a version-bump PR to main.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to release (e.g. v3.0.1-beta.5). Leave empty when triggered by tag push.'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  trivyignore-expiry:
    name: Trivy ignore expiry guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TRIVYIGNORE_EXPIRY_WARNING_DAYS: "45"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
      - name: Validate .trivyignore expiry dates
        run: |
          python3 scripts/ci-check-trivyignore-expiry.py \
            --file .trivyignore \
            --warning-days "$TRIVYIGNORE_EXPIRY_WARNING_DAYS"

  publish-npm:
    name: Publish npm
    needs: trivyignore-expiry
    uses: ./.github/workflows/reusable-publish-npm.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}
      sync-version-from-ref: true
      allow-existing-version: true
      force-publish: false
      upload-sbom: true
    secrets: inherit

  publish-docker:
    name: Publish Docker image
    needs: publish-npm
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Extract version from tag
        id: version
        run: echo "version=${{ needs.publish-npm.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          build-args: |
            PACKAGE_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            debian777/kairos-mcp:latest
            debian777/kairos-mcp:${{ steps.version.outputs.version }}
            quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:latest
            quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "debian777/kairos-mcp:${{ steps.version.outputs.version }}"
          cosign sign "debian777/kairos-mcp:latest"
          cosign sign "quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:${{ steps.version.outputs.version }}"
          cosign sign "quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:latest"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: debian777/kairos-mcp:${{ steps.version.outputs.version }}
          format: cyclonedx-json
          output-file: kairos-mcp-${{ steps.version.outputs.version }}-sbom.cdx.json
          upload-artifact: false

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom-${{ steps.version.outputs.version }}
          path: kairos-mcp-${{ steps.version.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: debian777/kairos-mcp:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  create-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-docker]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    permissions:
      contents: write

    steps:
      - name: Set tag name and prerelease flag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            tag_name="${{ github.event.inputs.ref }}"
          else
            tag_name="${{ github.ref_name }}"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          # Tag with hyphen (e.g. v3.1.0-pre.0, v3.0.1-beta.1) => prerelease; GitHub then shows latest stable as "Latest release"
          case "${tag_name}" in
            *-*) echo "prerelease=true" >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Download npm SBOM
        uses: actions/download-artifact@v8
        with:
          name: npm-sbom

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          # Hyphenated tags (v*.*.*-*) must be pre-releases so "Latest" stays on last stable
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          files: npm-sbom/*.cdx.json
