# Single release pipeline: on version tag push, publish npm then Docker.
# Only acceptable final output: npm package in registry, Docker image on Docker Hub and Quay.
# Triggered by release-tag-on-version-bump after merge of a version-bump PR to main.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag to release (e.g. v3.0.1-beta.5). Leave empty when triggered by tag push.'
        required: false

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-npm:
    name: Publish npm
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    # If you set an "Environment" in npm Trusted Publisher, set it here too (e.g. environment: production)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Set version and npm tag from ref
        id: version
        run: |
          ref="${{ github.event.inputs.ref }}"
          if [ -n "$ref" ]; then
            v="${ref#v}"
          else
            v="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          if echo "$v" | grep -q '-'; then
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync version from tag
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Set up Python (skills-ref)
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install skills-ref and validate skills
        run: |
          python -m pip install --upgrade pip
          pip install "skills-ref @ git+https://github.com/agentskills/agentskills.git#subdirectory=skills-ref"
          npm run lint:skills

      - name: Knip
        run: npm run knip

      - name: Prepare publish (build tgz + test install)
        run: npm run prepare:publish

      - name: Publish to npm
        run: |
          set +e
          out=$(npm publish ./dist/debian777-kairos-mcp-${{ steps.version.outputs.version }}.tgz --access public --tag ${{ steps.version.outputs.npm_tag }} 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 0; fi
          if echo "$out" | grep -q "You cannot publish over the previously published versions"; then
            echo "Version already on npm; continuing to Docker and GitHub Release"
            exit 0
          fi
          exit 1

      - name: Generate npm CycloneDX SBOM
        run: npx @cyclonedx/cyclonedx-npm@latest --output-file kairos-mcp-${{ steps.version.outputs.version }}-npm-sbom.cdx.json --output-format json

      - name: Upload npm SBOM
        uses: actions/upload-artifact@v4
        with:
          name: npm-sbom
          path: kairos-mcp-${{ steps.version.outputs.version }}-npm-sbom.cdx.json
          if-no-files-found: error

  publish-docker:
    name: Publish Docker image
    needs: publish-npm
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.ref }}

      - name: Extract version from tag
        id: version
        run: |
          ref="${{ github.event.inputs.ref }}"
          if [ -n "$ref" ]; then
            echo "version=${ref#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to Quay
        uses: docker/login-action@v4
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        id: build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: runtime
          build-args: |
            PACKAGE_VERSION=${{ steps.version.outputs.version }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            debian777/kairos-mcp:latest
            debian777/kairos-mcp:${{ steps.version.outputs.version }}
            quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:latest
            quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign images (keyless)
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign "debian777/kairos-mcp:${{ steps.version.outputs.version }}"
          cosign sign "debian777/kairos-mcp:latest"
          cosign sign "quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:${{ steps.version.outputs.version }}"
          cosign sign "quay.io/${{ vars.QUAY_NAMESPACE }}/kairos-mcp:latest"

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          image: debian777/kairos-mcp:${{ steps.version.outputs.version }}
          format: cyclonedx-json
          output-file: kairos-mcp-${{ steps.version.outputs.version }}-sbom.cdx.json
          upload-artifact: false

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@v4
        with:
          name: cyclonedx-sbom-${{ steps.version.outputs.version }}
          path: kairos-mcp-${{ steps.version.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: debian777/kairos-mcp:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  create-release:
    name: Create GitHub Release
    needs: [publish-npm, publish-docker]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.ref != '')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true
    permissions:
      contents: write

    steps:
      - name: Set tag name and prerelease flag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.ref }}" ]; then
            tag_name="${{ github.event.inputs.ref }}"
          else
            tag_name="${{ github.ref_name }}"
          fi
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          # Tag with hyphen (e.g. v3.1.0-pre.0, v3.0.1-beta.1) => prerelease; GitHub then shows latest stable as "Latest release"
          case "${tag_name}" in
            *-*) echo "prerelease=true" >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Download npm SBOM
        uses: actions/download-artifact@v8
        with:
          name: npm-sbom

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.tag_name }}
          generate_release_notes: true
          draft: false
          # Hyphenated tags (v*.*.*-*) must be pre-releases so "Latest" stays on last stable
          prerelease: ${{ steps.tag.outputs.prerelease == 'true' }}
          files: npm-sbom/*.cdx.json
