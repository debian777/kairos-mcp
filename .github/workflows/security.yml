# Security scans: dependency review (PRs), npm audit, CodeQL (SAST), base-image Trivy (OS only).
# Trivy scans Alpine OS only (vuln-type=os). We use the same FROM ref as Dockerfile plus the single
# apk zlib line from that file — scanning the raw digest alone would miss that layer (upstream image
# can still trail Alpine security fixes). No npm / app install. Full image+library scan: release.yml.
name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Sunday 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE25: true

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true  # Requires Dependency graph enabled in repo settings
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Dependency review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Optional: deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0

  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
        # Use --production to ignore devDependencies, or omit to include them

  container-base-os-trivy:
    name: Base image OS (Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Same Hub account as publish-container; without login, pulls are anonymous and share CI IP limits (429).
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Base image ref from Dockerfile
        id: base
        run: |
          line=$(grep -m1 '^FROM ' Dockerfile)
          ref="${line#FROM }"
          ref="${ref%% AS *}"
          echo "image_ref=$(echo "$ref" | xargs)" >> "$GITHUB_OUTPUT"

      - name: One-layer image (FROM + zlib RUN from Dockerfile)
        run: |
          img="${{ steps.base.outputs.image_ref }}"
          run_cmd=$(grep -E '^RUN apk update && apk upgrade --no-cache zlib$' Dockerfile | sed 's/^RUN //' | head -1)
          if [ -z "$run_cmd" ]; then echo "::error::Expected RUN apk … zlib line in Dockerfile"; exit 1; fi
          printf 'FROM %s\nRUN %s\n' "$img" "$run_cmd" | docker build -t kairos-os:ci -

      - name: Trivy (Alpine/OS packages only)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: kairos-os:ci
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          vuln-type: os

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript
          queries: security-extended
          config-file: .github/codeql/codeql-config.yml
      - name: Autobuild
        uses: github/codeql-action/autobuild@v4
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript"
