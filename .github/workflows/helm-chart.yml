# Helm chart: lint, values schema, helm-unittest, chart-testing (ct), kubeconform on rendered manifests.
name: Helm chart (kairos-mcp)

on:
  pull_request:
    paths:
      - "helm/kairos-mcp/**"
      - "ct.yaml"
      - ".github/workflows/helm-chart.yml"
  push:
    branches: [main, "ci/**"]
    paths:
      - "helm/kairos-mcp/**"
      - "ct.yaml"
      - ".github/workflows/helm-chart.yml"
  workflow_dispatch:

jobs:
  verify-chart-version:
    name: Verify chart version bumped
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Chart.yaml version vs main
        run: |
          set -euo pipefail
          pr_version=$(grep -E '^version:' helm/kairos-mcp/Chart.yaml | awk '{print $2}')
          main_version=$(git show origin/main:helm/kairos-mcp/Chart.yaml | grep -E '^version:' | awk '{print $2}')

          if [ -z "$pr_version" ] || [ -z "$main_version" ]; then
            echo "Could not parse chart versions (pr=$pr_version, main=$main_version)"
            exit 1
          fi

          higher=$(printf '%s\n' "$main_version" "$pr_version" | sort -V | tail -n1)
          if [ "$higher" = "$pr_version" ] && [ "$main_version" != "$pr_version" ]; then
            echo "Chart version bumped: $main_version -> $pr_version"
          else
            echo "::error::Chart version NOT bumped. PR=$pr_version, main=$main_version. The helm-version-bump bot should have committed a bump. If this persists, run: node scripts/helm-bump-version.mjs patch"
            exit 1
          fi

  helm:
    name: Lint, unittest, ct, kubeconform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.0.5

      - name: Add helm repos (chart dependencies)
        run: |
          helm repo add qdrant https://qdrant.github.io/qdrant-helm
          helm repo add valkey https://valkey.io/valkey-helm/

      - name: Helm dependency build
        run: helm dependency build helm/kairos-mcp

      - name: Helm lint (strict)
        run: helm lint helm/kairos-mcp --strict

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v1.0.3 --verify=false

      - name: helm unittest
        run: helm unittest helm/kairos-mcp

      - name: Run chart-testing (ct)
        uses: helm/chart-testing-action@v2.8.0
        with:
          version: v3.14.0

      - name: ct lint
        run: ct lint --config ct.yaml --all

      - name: Install kubeconform
        env:
          KUBECONFORM_VERSION: v0.6.7
        run: |
          set -euo pipefail
          curl -sSL "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: kubeconform (rendered manifests)
        run: |
          set -euo pipefail
          helm template kairos-mcp helm/kairos-mcp | kubeconform \
            -strict \
            -kubernetes-version 1.30.0 \
            -ignore-missing-schemas \
            -summary
