# Dependabot version updates — daily schedule for faster vulnerability response
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    # typescript-eslint 8.x peers typescript <6; keep TS 5 until a release widens the range.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
    groups:
      # Bundle all npm version updates into a single PR (branch/title: npm-dependencies)
      npm-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
