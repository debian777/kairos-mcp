version: '3.8'

services:
  # Development service: build from source with hot-reload
  app-dev:
    build:
      context: ..
      dockerfile: Dockerfile.dev
      target: production
    volumes:
      # Mount entire workspace for live editing
      - ..:/workspaces:cached
      # Preserve node_modules from container (avoid host conflict)
      - /workspaces/node_modules
      # Named volumes for app state
      - dev-logs:/app/logs
      - dev-storage:/app/storage
    working_dir: /workspaces
    # Override CMD: sleep infinity keeps container alive for npm run commands
    command: sleep infinity
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - kairos-network
    env_file:
      - ../.env

volumes:
  dev-logs:
  dev-storage:

# Reuse network from compose.yaml (no redefinition needed)
