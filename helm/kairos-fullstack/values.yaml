# KAIROS full stack — Qdrant + app. Redis, Keycloak, Postgres via operators (see docs/OPERATORS.md).
# Credentials: autogenerated and stored only in K8s Secret (see credentials below).

# -----------------------------------------------------------------------------
# Credentials — autogenerate and store only in K8s Secret (no values files).
# -----------------------------------------------------------------------------
credentials:
  name: kairos-fullstack-credentials
  existingSecret: ""
  autoGenerate: true

# -----------------------------------------------------------------------------
# HA — spread pods across nodes.
# -----------------------------------------------------------------------------
ha:
  spreadAcrossNodes: false

# -----------------------------------------------------------------------------
# Qdrant — HA: use odd replica count (3, 5, 7) for consensus quorum.
# -----------------------------------------------------------------------------
qdrant:
  enabled: true
  replicaCount: 3
  affinity: {}
  persistence:
    enabled: true
    size: 10Gi
  config:
    log_level: INFO
    storage:
      storage_path: /qdrant/storage
  service:
    http:
      port: 6333
    grpc:
      port: 6334
  resources:
    limits:
      memory: 4Gi
    requests:
      memory: 1Gi
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  vpa:
    enabled: false
    updateMode: Recreate
    minAllowed:
      memory: 512Mi
      cpu: 100m
    maxAllowed:
      memory: 8Gi
      cpu: 4

# -----------------------------------------------------------------------------
# KAIROS MCP app
# -----------------------------------------------------------------------------
app:
  enabled: true
  name: kairos-mcp
  image:
    repository: debian777/kairos-mcp
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 3000
  metricsPort: 9090
  redisUrl: ""
  qdrantUrl: ""
  keycloakInternalUrl: ""
  existingSecret: ""
  auth:
    enabled: true
    callbackBaseUrl: ""
    realm: kairos-dev
    clientId: kairos-mcp
  resources:
    limits:
      memory: 1Gi
    requests:
      memory: 256Mi
  affinity: {}
  nodeSelector: {}
  tolerations: []
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  vpa:
    enabled: false
    updateMode: Recreate
    minAllowed:
      memory: 128Mi
      cpu: 50m
    maxAllowed:
      memory: 2Gi
      cpu: 2

# -----------------------------------------------------------------------------
# Gateway API — expose MCP and Keycloak on same FQDN (path-based).
# -----------------------------------------------------------------------------
gateway:
  enabled: false
  createGateway: true
  gatewayClassName: ""
  gatewayName: kairos-gateway
  existingGatewayName: ""
  existingGatewayNamespace: ""
  hostname: ""
  tls:
    secretName: ""
    certManager:
      enabled: true
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      secretName: ""
  routes:
    keycloak:
      path: /sso
      serviceName: ""
      serviceNamespace: ""
      port: 8080
    mcp:
      path: /

# -----------------------------------------------------------------------------
# Optional: create cluster CRs (operators must be installed).
# -----------------------------------------------------------------------------
redisCluster:
  enabled: false
  useOwnCluster: false
  namespace: redis-operator
  name: kairos-redis
  replicas: 2
  sentinelReplicas: 2
  customSpec: {}

keycloakInstance:
  enabled: false
  useOwnCluster: false
  namespace: keycloak
  name: kairos-keycloak
  replicas: 2
  postgresHost: ""
  postgresDatabase: keycloak
  postgresUser: keycloak
  customSpec: {}

postgresCluster:
  enabled: false
  useOwnCluster: false
  namespace: percona-pg
  name: keycloak-db
  instances: 2
  storageSize: 5Gi
  customSpec: {}
  vpa:
    enabled: false
    targetKind: StatefulSet
    targetName: ""
    updateMode: Off
    minAllowed:
      memory: 256Mi
      cpu: 100m
    maxAllowed:
      memory: 4Gi
      cpu: 2

# -----------------------------------------------------------------------------
# Monitoring — ServiceMonitors and alerts (Prometheus Operator).
# App exposes /metrics on app.metricsPort (9090); Qdrant on port 6333.
# -----------------------------------------------------------------------------
monitoring:
  serviceMonitor:
    app:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      release: ""
    qdrant:
      enabled: false
      interval: 30s
      scrapeTimeout: 10s
      release: ""
    redis:
      enabled: false
      interval: 30s
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
    keycloak:
      enabled: false
      interval: 30s
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
    postgres:
      enabled: false
      interval: 30s
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
  prometheusRule:
    enabled: false
    release: ""
    rules: []
