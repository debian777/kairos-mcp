{{- if and .Values.gateway.enabled .Values.gateway.tls.certManager.enabled .Values.gateway.hostname }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-gateway-tls
  labels:
    app.kubernetes.io/part-of: kairos-fullstack
spec:
  secretName: {{ .Values.gateway.tls.certManager.secretName | default (printf "%s-gateway-tls" .Release.Name) }}
  issuerRef:
    {{- toYaml .Values.gateway.tls.certManager.issuerRef | nindent 4 }}
  dnsNames:
    - {{ .Values.gateway.hostname }}
{{- end }}
