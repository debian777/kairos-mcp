{{- if and .Values.gateway.enabled .Values.gateway.createGateway .Values.gateway.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.gatewayName }}
  labels:
    app.kubernetes.io/part-of: kairos-fullstack
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ .Values.gateway.hostname }}
      {{- if .Values.gateway.tls.certManager.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.certManager.secretName | default (printf "%s-gateway-tls" .Release.Name) }}
      {{- else if .Values.gateway.tls.secretName }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ .Values.gateway.tls.secretName }}
      {{- end }}
{{- end }}
