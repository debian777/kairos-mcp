# helm/.dev/values-http.yaml — Stage 2 local dev profile.
# Adds HTTP ingress/Gateway routing on top of the core baseline.

app:
  replicaCount: 2
  logFormat: json
  image:
    repository: quay.io/debian777/kairos-mcp

# Keep anti-affinity enabled in dev as a soft preference.
ha:
  antiAffinity:
    mode: soft

# Traefik Gateway (pre-installed on k3s / Rancher Desktop).
# mode: auto detects Gateway API CRDs -> uses Gateway; falls back to Ingress.
# Traefik entrypoint: web=8000 (mapped to svc 80).
gateway:
  enabled: true
  createGateway: true
  gatewayClassName: kairos
  hostname: localhost
  httpPort: 8000
  routes:
    mcp:
      path: /
    keycloak:
      enabled: false

valkey:
  enabled: false
