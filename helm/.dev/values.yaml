# helm/.dev/values.yaml — Core baseline for local chart testing.
# Stage 1: only app + Qdrant (gateway and Valkey explicitly disabled).
# Use this to validate the smallest deployable setup first.

app:
  replicaCount: 2
  logFormat: json
  image:
    repository: debian777/kairos-mcp

# Keep anti-affinity enabled in dev as a soft preference.
ha:
  antiAffinity:
    mode: soft

gateway:
  enabled: false

valkey:
  enabled: false
