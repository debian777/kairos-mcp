# helm/.dev/values-tls-redis.yaml — Local dev with HTTP + Valkey (TLS disabled).
# Usage:
#   ./helm/.dev/helm-deploy.sh --profile tls-redis

app:
  replicaCount: 2
  logFormat: json
  image:
    repository: quay.io/debian777/kairos-mcp

# Keep anti-affinity enabled in dev as a soft preference.
ha:
  antiAffinity:
    mode: soft

# Traefik Gateway over HTTP.
gateway:
  enabled: true
  createGateway: true
  gatewayClassName: kairos
  hostname: localhost
  httpPort: 8000
  # TLS intentionally disabled in .dev for now.
  # allowHttpWithTls: true
  # httpsPort: 8443
  # tls:
  #   certManager:
  #     enabled: true
  #     secretName: kairos-dev-tls
  #     issuerRef:
  #       name: selfsigned
  #       kind: ClusterIssuer
  routes:
    mcp:
      path: /
    keycloak:
      enabled: false

valkey:
  enabled: true
  dataStorage:
    enabled: true
    requestedSize: 1Gi
