# helm/.dev/values-full.yaml — Stage 5 local dev profile.
# Adds operator-backed components (Postgres + Keycloak) on top of HTTP + Valkey.
# Usage:
#   ./helm/.dev/helm-deploy.sh --profile full

app:
  replicaCount: 2
  logFormat: json
  image:
    repository: quay.io/debian777/kairos-mcp
  keycloakUrl: http://localhost/sso
  keycloakInternalUrl: http://keycloak-service:8080/sso
  auth:
    enabled: true
    callbackBaseUrl: http://localhost

# Keep anti-affinity enabled in dev as a soft preference.
ha:
  antiAffinity:
    mode: soft

# Traefik Gateway over HTTP (TLS disabled in .dev for now).
gateway:
  enabled: true
  createGateway: true
  gatewayClassName: kairos
  hostname: localhost
  httpPort: 8000
  # TLS intentionally disabled in .dev for now.
  # allowHttpWithTls: true
  # httpsPort: 8443
  # tls:
  #   certManager:
  #     enabled: true
  #     secretName: kairos-dev-tls
  #     issuerRef:
  #       name: selfsigned
  #       kind: ClusterIssuer
  routes:
    mcp:
      path: /
    keycloak:
      enabled: true
      path: /sso

valkey:
  enabled: true
  dataStorage:
    enabled: true
    requestedSize: 1Gi

postgresCluster:
  enabled: true

keycloakInstance:
  enabled: true

keycloakRealmImport:
  enabled: true
