# Production overlay example.
#
# Copy this file and customize for your environment. Install operators first:
#   ./helm/prerequisites/install-keycloak-operator.sh
#   ./helm/prerequisites/install-pg-operator.sh
#
# Then install the chart:
#   helm upgrade --install kairos helm/kairos-mcp -n kairos -f my-values.yaml --wait

app:
  enabled: true
  replicaCount: 2
  # Image defaults are set in the chart (helm/kairos-mcp/values.yaml) and always
  # track the latest stable release. Uncomment to pin a specific version:
  # image:
  #   repository: quay.io/debian777/kairos-mcp
  #   tag: "4.3.1"
  #   pullPolicy: IfNotPresent
  # Spotahome RedisFailover: redis service is rfr-<redisCluster.name>
  redisUrl: redis://rfr-kairos-redis:6379
  qdrantUrl: http://kairos-qdrant:6333
  keycloakUrl: https://landyn-frictional-brylee.ngrok-free.dev/sso
  keycloakInternalUrl: http://keycloak-service:8080
  auth:
    enabled: true
    realm: kairos
    clientId: kairos-mcp
    # Public origin for OIDC redirect_uri (no trailing slash); must match gateway hostname.
    callbackBaseUrl: https://landyn-frictional-brylee.ngrok-free.dev
    oidcGroupsAllowlist: /shared/
  embedding:
    openai:
      existingSecret: kairos-mcp-embedding
      secretKey: OPENAI_API_KEY
      model: text-embedding-3-small
  extraEnv: []

ha:
  spreadAcrossNodes: false

gateway:
  enabled: true
  createGateway: true
  gatewayName: kairos-gateway
  gatewayClassName: ngrok
  # Must match a hostname your ngrok account can use (free tier: use your assigned subdomain, not an arbitrary name).
  hostname: landyn-frictional-brylee.ngrok-free.dev
  tls:
    certManager:
      enabled: false
  routes:
    mcp:
      path: /
    keycloak:
      enabled: true
      path: /sso
      serviceName: keycloak-service
      port: 8080

qdrant:
  enabled: true
  replicaCount: 3

redisCluster:
  enabled: true
  name: kairos-redis
  replicas: 3
  sentinelReplicas: 3

# Import kairos realm (redirect URIs include https://<gateway.hostname>/…).
keycloakRealmImport:
  enabled: true
  name: kairos-realm-import

keycloakInstance:
  enabled: true
  name: keycloak
  replicas: 2
  http:
    httpEnabled: true
    httpPort: 8080
  httpRelativePath: /sso

postgresCluster:
  enabled: true
  name: kairos-postgres
  instances: 3
  backupStorage: 1Gi
  pgBouncerReplicas: 1
  storage: 1Gi
  defaultUser:
    name: keycloak
    database: keycloak
