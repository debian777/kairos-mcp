# Repo-local overlay for k3d local-ha-cluster.
#
# Full stack (infra + app + Keycloak + Gateway routes on ngrok):
#   set -a && source .env && set +a && ./helm/.dev/k3b.sh
# If your reserved ngrok hostname differs from gateway.hostname below:
#   KAIROS_NGROK_HOSTNAME=your-name.ngrok-free.dev ./helm/.dev/k3b.sh
# Operators + ngrok only (no Helm release):
#   KAIROS_SKIP_CHART=1 ./helm/.dev/k3b.sh
#
# The app image (see app.image below) must exist in the cluster; for k3d build
# and import, for example: npm run docker:build:dev && k3d image import debian777/kairos-mcp:dev

app:
  image:
    repository: quay.io/debian777/kairos-mcp
    tag: latest
    pullPolicy: IfNotPresent
  # Spotahome RedisFailover: redis service is rfr-<redisCluster.name>
  redisUrl: redis://rfr-kairos-redis:6379
  qdrantUrl: http://kairos-qdrant:6333
  keycloakUrl: https://landyn-frictional-brylee.ngrok-free.dev/sso
  keycloakInternalUrl: http://keycloak-service:8080
  auth:
    enabled: true
    realm: kairos
    clientId: kairos-mcp
    # Public origin for OIDC redirect_uri (no trailing slash); must match gateway hostname.
    callbackBaseUrl: https://landyn-frictional-brylee.ngrok-free.dev
    oidcGroupsAllowlist: /shared/
  embedding:
    openai:
      model: nomic-embed-text
  extraEnv:
    - name: OPENAI_API_URL
      value: http://ollama:11434
    - name: OPENAI_API_KEY
      value: "ollama"

# Chart default ha.antiAffinity.mode is "hard"; use ha.antiAffinity.mode: soft|none if k3d nodes are tight.

gateway:
  enabled: true
  createGateway: true
  gatewayName: kairos-gateway
  gatewayClassName: ngrok
  # Must match a hostname your ngrok account can use (free tier: use your assigned subdomain, not an arbitrary name).
  hostname: landyn-frictional-brylee.ngrok-free.dev
  tls:
    certManager:
      enabled: false
  routes:
    mcp:
      path: /
      cors:
        enabled: true
    keycloak:
      enabled: true
      path: /sso
      serviceName: keycloak-service
      port: 8080

redisCluster:
  enabled: true

# Import kairos realm (redirect URIs include https://<gateway.hostname>/…).
keycloakRealmImport:
  enabled: true

keycloakInstance:
  enabled: true
  http:
    httpEnabled: true
    httpPort: 8080
  httpRelativePath: /sso

postgresCluster:
  enabled: true
  backupStorage: 1Gi
  storage: 1Gi
  # Fewer pooler pods than chart default (2) for smaller dev clusters.
  pgBouncerReplicas: 1

ollama:
  enabled: true
