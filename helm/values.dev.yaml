# Example overlay for local k3d + ngrok (not chart defaults).
#
# Prereqs: kubectl apply -k helm/operators && (ngrok Secret + kubectl apply -k helm/infrastructure).
# Create embedding Secret: kubectl create secret generic kairos-mcp-embedding -n kairos \
#   --from-literal=OPENAI_API_KEY="$OPENAI_API_KEY" --dry-run=client -o yaml | kubectl apply -f -
# Install: helm dependency update helm/kairos-mcp && helm upgrade --install kairos helm/kairos-mcp \
#   -n kairos --create-namespace -f helm/values.dev.yaml
#
# Optional k3d: ./helm/.dev/cluster-k3d.sh — see helm/.dev/README.md and helm/README.md.
#
# The app image must exist in the cluster (e.g. npm run docker:build:dev && k3d image import debian777/kairos-mcp:dev).

app:
  replicaCount: 2
  image:
    repository: debian777/kairos-mcp
    tag: latest
    pullPolicy: IfNotPresent
  # Spotahome RedisFailover: redis service is rfr-<redisCluster.name>
  redisUrl: redis://rfr-kairos-redis:6379
  qdrantUrl: http://kairos-qdrant:6333
  keycloakUrl: https://landyn-frictional-brylee.ngrok-free.dev/sso
  keycloakInternalUrl: http://keycloak-service:8080/sso
  auth:
    enabled: true
    realm: kairos
    clientId: kairos-mcp
    # Public origin for OIDC redirect_uri (no trailing slash); must match gateway hostname.
    callbackBaseUrl: https://landyn-frictional-brylee.ngrok-free.dev
    oidcGroupsAllowlist: /shared/
  embedding:
    openai:
      existingSecret: kairos-mcp-embedding
      secretKey: OPENAI_API_KEY
      model: text-embedding-3-small
  extraEnv: []

ha:
  spreadAcrossNodes: false

gateway:
  enabled: true
  createGateway: true
  gatewayName: kairos-gateway
  gatewayClassName: ngrok
  # Must match a hostname your ngrok account can use (free tier: use your assigned subdomain, not an arbitrary name).
  hostname: landyn-frictional-brylee.ngrok-free.dev
  tls:
    certManager:
      enabled: false
  routes:
    mcp:
      path: /
    keycloak:
      enabled: true
      path: /sso
      serviceName: keycloak-service
      port: 8080

qdrant:
  replicaCount: 3

redisCluster:
  enabled: true
  name: kairos-redis
  replicas: 3
  sentinelReplicas: 3

# Import kairos realm (redirect URIs include https://<gateway.hostname>/…).
keycloakRealmImport:
  enabled: true
  name: kairos-realm-import

keycloakInstance:
  enabled: true
  name: keycloak
  replicas: 2
  http:
    httpEnabled: true
    httpPort: 8080
  httpRelativePath: /sso

postgresCluster:
  enabled: true
  name: kairos-postgres
  instances: 3
  backupStorage: 1Gi
  pgBouncerReplicas: 1
  storage: 1Gi
  defaultUser:
    name: keycloak
    database: keycloak
