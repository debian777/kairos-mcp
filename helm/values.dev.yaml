# Repo-local overlay for k3d local-ha-cluster.
#
# Full stack (infra + app + Keycloak + Gateway routes on ngrok): load the key
# into the shell, then run k3b (it creates the Secret from $OPENAI_API_KEY):
#   set -a && source .env && set +a && ./helm/k3b.sh
# If your reserved ngrok hostname differs from gateway.hostname below:
#   KAIROS_NGROK_HOSTNAME=your-name.ngrok-free.dev ./helm/k3b.sh
# Operators + ngrok only (no Helm release):
#   KAIROS_SKIP_CHART=1 ./helm/k3b.sh
#
# The app image (see app.image below) must exist in the cluster; for k3d build
# and import, for example: npm run docker:build:dev && k3d image import debian777/kairos-mcp:dev

app:
  enabled: true
  replicaCount: 2
  image:
    repository: debian777/kairos-mcp
    tag: dev
    pullPolicy: IfNotPresent
  # Spotahome RedisFailover: redis service is rfr-<redisCluster.name>
  redisUrl: redis://rfr-kairos-redis:6379
  qdrantUrl: http://kairos-qdrant:6333
  keycloakUrl: https://landyn-frictional-brylee.ngrok-free.dev/sso
  keycloakInternalUrl: http://keycloak-service:8080/sso
  auth:
    enabled: true
    realm: kairos
    clientId: kairos-mcp
    # Public origin for OIDC redirect_uri (no trailing slash); must match gateway hostname.
    callbackBaseUrl: https://landyn-frictional-brylee.ngrok-free.dev
    oidcGroupsAllowlist: /shared/
  embedding:
    openai:
      existingSecret: kairos-mcp-embedding
      secretKey: OPENAI_API_KEY
      model: text-embedding-3-small
  extraEnv: []

ha:
  spreadAcrossNodes: false

gateway:
  enabled: true
  createGateway: true
  gatewayName: kairos-gateway
  gatewayClassName: ngrok
  # Must match a hostname your ngrok account can use (free tier: use your assigned subdomain, not an arbitrary name).
  hostname: landyn-frictional-brylee.ngrok-free.dev
  tls:
    certManager:
      enabled: false
  routes:
    mcp:
      path: /
    keycloak:
      enabled: true
      path: /sso
      serviceName: keycloak-service
      port: 8080

qdrant:
  enabled: true
  replicaCount: 3

redisCluster:
  enabled: true
  name: kairos-redis
  replicas: 3
  sentinelReplicas: 3

# Import kairos realm (redirect URIs include https://<gateway.hostname>/…).
keycloakRealmImport:
  enabled: true
  name: kairos-realm-import

keycloakInstance:
  enabled: true
  name: keycloak
  replicas: 2
  http:
    httpEnabled: true
    httpPort: 8080
  httpRelativePath: /sso

postgresCluster:
  enabled: true
  name: kairos-postgres
  instances: 3
  backupStorage: 1Gi
  pgBouncerReplicas: 1
  storage: 1Gi
  defaultUser:
    name: keycloak
    database: keycloak
