{{- if and .Values.keycloakInstance.enabled (not .Values.keycloakInstance.useOwnCluster) }}
{{- $spec := default dict .Values.keycloakInstance.customSpec }}
{{- if not (kindIs "map" $spec) }}
{{- $_ := fail "keycloakInstance.customSpec must be a map (object)" }}
{{- end }}
{{- $kc := .Values.keycloakInstance }}
{{- $pg := .Values.postgresCluster }}
{{- $gateway := default dict .Values.gateway }}
{{- $routes := default dict $gateway.routes }}
{{- $kcRoute := default dict $routes.keycloak }}
{{- $relativePath := default (default "/sso" $kcRoute.path) $kc.httpRelativePath }}
{{- $hostnameUrl := default "" $kc.hostname.url }}
{{- if and (eq $hostnameUrl "") $gateway.hostname }}
{{- $hostnameUrl = printf "https://%s%s" $gateway.hostname $relativePath }}
{{- end }}
{{- $dbHost := default "" $kc.db.host }}
{{- if and (eq $dbHost "") $pg.enabled (not $pg.useOwnCluster) }}
{{- $dbHost = printf "%s-pgbouncer" $pg.name }}
{{- end }}
{{- $dbUserSecret := default "" $kc.db.usernameSecretName }}
{{- if and (eq $dbUserSecret "") $pg.enabled (not $pg.useOwnCluster) }}
{{- $dbUserSecret = printf "%s-pguser-%s" $pg.name $pg.defaultUser.name }}
{{- end }}
{{- $dbPassSecret := default "" $kc.db.passwordSecretName }}
{{- if and (eq $dbPassSecret "") $pg.enabled (not $pg.useOwnCluster) }}
{{- $dbPassSecret = printf "%s-pguser-%s" $pg.name $pg.defaultUser.name }}
{{- end }}
{{- if and (empty $spec) (or (eq $dbHost "") (eq $dbUserSecret "") (eq $dbPassSecret "")) }}
{{- $_ := fail "keycloakInstance requires db host and secret references, or postgresCluster.enabled with defaultUser configured, unless keycloakInstance.customSpec is set" }}
{{- end }}
apiVersion: k8s.keycloak.org/v2alpha1
kind: Keycloak
metadata:
  name: {{ $kc.name }}
  namespace: {{ $kc.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  {{- if empty $spec }}
  instances: {{ $kc.replicas }}
  ingress:
    enabled: false
  proxy:
    headers: {{ $kc.proxy.headers | quote }}
  http:
    httpEnabled: {{ $kc.http.httpEnabled }}
    httpPort: {{ $kc.http.httpPort }}
  hostname:
    {{- if $hostnameUrl }}
    hostname: {{ $hostnameUrl | quote }}
    {{- end }}
    strict: {{ $kc.hostname.strict }}
  db:
    vendor: postgres
    host: {{ $dbHost | quote }}
    port: {{ $kc.db.port }}
    database: {{ $kc.db.database | quote }}
    usernameSecret:
      name: {{ $dbUserSecret | quote }}
      key: {{ $kc.db.usernameSecretKey | quote }}
    passwordSecret:
      name: {{ $dbPassSecret | quote }}
      key: {{ $kc.db.passwordSecretKey | quote }}
  additionalOptions:
    - name: http-relative-path
      value: {{ $relativePath | quote }}
  {{- else }}
  {{- toYaml $spec | nindent 2 }}
  {{- end }}
{{- end }}
