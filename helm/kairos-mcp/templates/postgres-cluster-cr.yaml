{{- if and .Values.postgresCluster.enabled (not .Values.postgresCluster.useOwnCluster) }}
apiVersion: pgv2.percona.com/v2
kind: PerconaPGCluster
metadata:
  name: {{ .Values.postgresCluster.name }}
  namespace: {{ .Values.postgresCluster.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  {{- with .Values.postgresCluster.customSpec }}
  {{- toYaml . | nindent 2 }}
  {{- else }}
  crVersion: {{ .Values.postgresCluster.crVersion | quote }}
  image: {{ .Values.postgresCluster.image | quote }}
  postgresVersion: {{ .Values.postgresCluster.postgresVersion }}
  instances:
    - name: instance1
      replicas: {{ .Values.postgresCluster.instances }}
      dataVolumeClaimSpec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ .Values.postgresCluster.storage | quote }}
  proxy:
    pgBouncer:
      image: {{ .Values.postgresCluster.pgBouncerImage | quote }}
      replicas: {{ .Values.postgresCluster.pgBouncerReplicas }}
  backups:
    pgbackrest:
      image: {{ .Values.postgresCluster.pgBackRestImage | quote }}
      repos:
        - name: repo1
          volume:
            volumeClaimSpec:
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: {{ .Values.postgresCluster.backupStorage | quote }}
  users:
    - name: {{ .Values.postgresCluster.defaultUser.name | quote }}
      databases:
        - {{ .Values.postgresCluster.defaultUser.database | quote }}
  {{- end }}
{{- end }}
