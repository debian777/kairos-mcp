{{- if and .Values.ollama .Values.ollama.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ollama
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: ollama-headless
  labels:
    app.kubernetes.io/name: ollama
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: ollama
  ports:
    - port: 11434
      targetPort: http
      protocol: TCP
      name: http
{{- end }}
