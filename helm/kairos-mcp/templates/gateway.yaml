{{- $gw := default dict .Values.gateway }}
{{- $tls := default dict $gw.tls }}
{{- $certManager := default dict $tls.certManager }}
{{- $hasTLS := or $certManager.enabled $tls.secretName }}
{{- $allowHttpWithTLS := default false $gw.allowHttpWithTls }}
{{- $mode := include "kairos.ingressMode" . | trim }}
{{- $gwNamespace := .Release.Namespace }}
{{- $psa := default "" $gw.podSecurityAdmission }}
{{- if and $psa $gw.enabled }}
---
# Istio auto-provisioned gateway pods omit securityContext.seccompProfile
# (see istio/istio#56383). Label the namespace so PSA allows them.
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $gwNamespace }}
  labels:
    pod-security.kubernetes.io/enforce: {{ $psa | quote }}
    pod-security.kubernetes.io/enforce-version: "latest"
    pod-security.kubernetes.io/warn: {{ $psa | quote }}
    pod-security.kubernetes.io/audit: {{ $psa | quote }}
{{- end }}
{{- if and $gw.enabled $gw.createGateway $gw.hostname (eq $mode "gateway") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gw.gatewayName | default "kairos-gateway" }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  gatewayClassName: {{ $gw.gatewayClassName }}
  listeners:
    {{- if or (not $hasTLS) $allowHttpWithTLS }}
    - name: http
      protocol: HTTP
      port: {{ $gw.httpPort | default 80 }}
      hostname: {{ $gw.hostname }}
    {{- end }}
    {{- if $hasTLS }}
    - name: https
      protocol: HTTPS
      port: {{ $gw.httpsPort | default 443 }}
      hostname: {{ $gw.hostname }}
      {{- if $certManager.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $certManager.secretName | default (printf "%s-gateway-tls" .Release.Name) }}
      {{- else if $tls.secretName }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $tls.secretName }}
      {{- end }}
    {{- end }}
{{- end }}
