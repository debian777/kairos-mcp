{{- $gateway := default dict .Values.gateway }}
{{- $tls := default dict $gateway.tls }}
{{- $certManager := default dict $tls.certManager }}
{{- if and $gateway.enabled $gateway.createGateway $gateway.hostname }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gateway.gatewayName }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  gatewayClassName: {{ $gateway.gatewayClassName }}
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: {{ $gateway.hostname }}
      {{- if $certManager.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $certManager.secretName | default (printf "%s-gateway-tls" .Release.Name) }}
      {{- else if $tls.secretName }}
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: {{ $tls.secretName }}
      {{- end }}
{{- end }}
