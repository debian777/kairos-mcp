{{- $gw := default dict .Values.gateway }}
{{- $tls := default dict $gw.tls }}
{{- $certManager := default dict $tls.certManager }}
{{- $hasTLS := or $certManager.enabled $tls.secretName }}
{{- $allowHttpWithTLS := default false $gw.allowHttpWithTls }}
{{- $mode := include "kairos.ingressMode" . | trim }}
{{- if and $gw.enabled $gw.createGateway $gw.hostname (eq $mode "gateway") }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $gw.gatewayName | default "kairos-gateway" }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
    {{- $dm := $gw.dataplaneMode }}
    {{- if not (and (kindIs "string" $dm) (eq $dm "")) }}
    istio.io/dataplane-mode: {{ default "ambient" $dm }}
    {{- end }}
spec:
  gatewayClassName: {{ $gw.gatewayClassName }}
  listeners:
    {{- if or (not $hasTLS) $allowHttpWithTLS }}
    - name: http
      protocol: HTTP
      port: {{ $gw.httpPort | default 80 }}
      hostname: {{ $gw.hostname }}
    {{- end }}
    {{- if $hasTLS }}
    - name: https
      protocol: HTTPS
      port: {{ $gw.httpsPort | default 443 }}
      hostname: {{ $gw.hostname }}
      {{- if $certManager.enabled }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $certManager.secretName | default (printf "%s-gateway-tls" .Release.Name) }}
      {{- else if $tls.secretName }}
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: {{ $tls.secretName }}
      {{- end }}
    {{- end }}
{{- end }}
