{{- if and .Values.redisCluster.enabled (not .Values.redisCluster.useOwnCluster) }}
# Spotahome redis-operator ≥3.2 may not create an rfr-* ClusterIP for the Redis master;
# the app expects redis://rfr-<redisCluster.name>:6379 (see values docs).
apiVersion: v1
kind: Service
metadata:
  name: rfr-{{ .Values.redisCluster.name }}
  namespace: {{ .Values.redisCluster.namespace | default .Release.Namespace }}
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    redisfailovers.databases.spotahome.com/name: {{ .Values.redisCluster.name | quote }}
    redisfailovers-role: master
{{- end }}
