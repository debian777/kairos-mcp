{{- $gateway := default dict .Values.gateway }}
{{- $routes := default dict $gateway.routes }}
{{- $route := default dict $routes.keycloak }}
{{- $kc := .Values.keycloakInstance }}
{{- $serviceName := default (printf "%s-service" $kc.name) $route.serviceName }}
{{- $servicePort := default $kc.http.httpPort $route.port }}
{{- if and $gateway.enabled $gateway.hostname $route.enabled $serviceName }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: keycloak-route
  labels:
    app.kubernetes.io/part-of: {{ .Chart.Name | quote }}
spec:
  parentRefs:
    - name: {{ $gateway.existingGatewayName | default $gateway.gatewayName }}
      {{- if $gateway.existingGatewayNamespace }}
      namespace: {{ $gateway.existingGatewayNamespace }}
      {{- else }}
      namespace: {{ .Release.Namespace }}
      {{- end }}
  hostnames:
    - {{ $gateway.hostname }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ $route.path | default ($kc.httpRelativePath | default "/sso") }}
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: {{ include "kairos.publicScheme" . | trim }}
              - name: X-Forwarded-Host
                value: {{ include "kairos.publicHost" . | trim }}
              - name: X-Forwarded-Port
                value: {{ include "kairos.publicPort" . | trim | quote }}
      backendRefs:
        - name: {{ $serviceName }}
          namespace: {{ $route.serviceNamespace | default $kc.namespace | default .Release.Namespace }}
          port: {{ $servicePort | int }}
{{- end }}
