{{- $gateway := default dict .Values.gateway }}
{{- $routes := default dict $gateway.routes }}
{{- $route := default dict $routes.keycloak }}
{{- $kc := .Values.keycloakInstance }}
{{- $serviceName := default (printf "%s-service" $kc.name) $route.serviceName }}
{{- $kcNs := $route.serviceNamespace | default $kc.namespace | default .Release.Namespace }}
{{- if and $gateway.enabled $route.enabled $serviceName (ne $kcNs .Release.Namespace) }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: allow-{{ .Release.Namespace }}-to-keycloak
  namespace: {{ $kcNs }}
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Release.Namespace }}
  to:
    - group: ""
      kind: Service
{{- end }}
