# ------------------------------------------------------------------------------
# KAIROS MCP chart defaults.
# Keep this file complete: templates rely on explicit nested keys existing.
# ------------------------------------------------------------------------------

global:
  name: "kairos"
  namespace: ""
  hostname: "kairos.example.com"

credentials:
  autoGenerate: true
  existingSecret: ""
  name: ""

hooks:
  kubectlImage: "cgr.dev/chainguard/kubectl:1.33-dev"
  operatorPrecheckEnabled: false

ha:
  antiAffinity:
    # hard | soft | none
    # hard: requiredDuringSchedulingIgnoredDuringExecution
    # soft: preferredDuringSchedulingIgnoredDuringExecution
    # none: disable chart-managed pod anti-affinity
    mode: "hard"
    # Topology keys used for pod anti-affinity matching.
    # For hyperscalers, optionally add: topology.kubernetes.io/zone
    topologyKeys:
      - "kubernetes.io/hostname"
    # Example (hyperscaler multi-zone):
    # topologyKeys:
    #   - "kubernetes.io/hostname"
    #   - "topology.kubernetes.io/zone"
    #
    # Example overrides:
    # mode: "soft"   # prefer spreading, allow co-location if needed
    # mode: "none"   # disable chart-managed anti-affinity

app:
  enabled: true
  name: "kairos-mcp"
  replicaCount: 2
  port: 3000
  metricsPort: 9090
  image:
    repository: "quay.io/debian777/kairos-mcp"
    tag: "4.7.2"
    pullPolicy: "IfNotPresent"
  existingSecret: ""
  redisUrl: ""
  qdrantUrl: ""
  keycloakUrl: ""
  keycloakInternalUrl: ""
  auth:
    enabled: false
    realm: "kairos"
    clientId: "kairos-mcp"
    callbackBaseUrl: ""
    # JWT `groups` prefix allowlist (see src/config OIDC_GROUPS_ALLOWLIST). Empty = omit env (app deny-all for groups).
    # Default matches bundled realm paths under /shared/…
    oidcGroupsAllowlist: "/shared/"
  # OpenAI embeddings (required for the app to start unless you set TEI via extraEnv).
  embedding:
    openai:
      existingSecret: ""
      secretKey: "OPENAI_API_KEY"
      model: "text-embedding-3-small"
  extraEnv: []
  resources: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  hpa:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  vpa:
    enabled: false
    updateMode: "Off"
    minAllowed:
      cpu: "100m"
      memory: "128Mi"
    maxAllowed:
      cpu: "2"
      memory: "2Gi"

gateway:
  enabled: true
  mode: "auto"
  createGateway: false
  gatewayName: "kairos-gateway"
  existingGatewayName: ""
  existingGatewayNamespace: ""
  gatewayClassName: "ngrok"
  hostname: ""
  httpPort: 80
  httpsPort: 443
  # When TLS is enabled, also expose HTTP listener (useful for local dev).
  allowHttpWithTls: false
  ingressClassName: ""
  tls:
    secretName: ""
    certManager:
      enabled: false
      secretName: ""
      issuerRef:
        name: "letsencrypt-prod"
        kind: "ClusterIssuer"
  routes:
    mcp:
      path: "/"
    keycloak:
      enabled: true
      path: "/sso"
      serviceName: ""
      serviceNamespace: ""
      port: 8080
      adminLockdown:
        enabled: true
        adminHostname: ""

qdrant:
  enabled: true
  replicaCount: 3
  hpa:
    enabled: false
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80
  vpa:
    enabled: false
    updateMode: "Off"
    minAllowed:
      cpu: "100m"
      memory: "128Mi"
    maxAllowed:
      cpu: "2"
      memory: "2Gi"

redisCluster:
  enabled: false
  useOwnCluster: false
  namespace: ""
  name: "kairos-redis"
  sentinelReplicas: 3
  replicas: 3
  customSpec: {}

valkey:
  enabled: false
  replica:
    enabled: false
    replicas: 2
    persistence:
      size: 1Gi
  dataStorage:
    enabled: true

ollama:
  enabled: false
  replicas: 2
  image:
    repository: "ollama/ollama"
    tag: "0.23.0"
  model: "nomic-embed-text"
  storageSize: "10Gi"
  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

keycloakInstance:
  enabled: false
  useOwnCluster: false
  namespace: ""
  name: "keycloak"
  replicas: 2
  http:
    httpEnabled: true
    httpPort: 8080
  hostname:
    url: ""
    strict: false
  proxy:
    headers: "xforwarded"
    trustedAddresses: ""
  httpRelativePath: "/sso"
  db:
    host: ""
    port: 5432
    database: "keycloak"
    usernameSecretName: ""
    usernameSecretKey: "user"
    passwordSecretName: ""
    passwordSecretKey: "password"
  customSpec: {}

# First-install-only KeycloakRealmImport (operator imports realm, then CR is not re-rendered).
# ArgoCD: MUST set spec.source.helm.enableLookup: true — without it, lookup() returns empty
# and the CR renders on every sync (the exact drift this guard prevents).
# A tracking ConfigMap (<release>-realm-imported) is always created alongside for environments
# that also support lookup; it does NOT replace lookup when enableLookup is missing.
# Requires keycloakInstance.enabled and Keycloak operator.
keycloakRealmImport:
  enabled: false
  name: "kairos-realm-import"
  realmFile: "kairos-realm.json"
  # Preferred explicit public origin (scheme + host [+ optional port]), e.g. http://localhost or https://kairos.example.com.
  # If empty, template falls back to app.auth.callbackBaseUrl, then publicHost/gateway.hostname with inferred scheme.
  publicBaseUrl: ""
  # If empty, uses gateway.hostname for https://… redirect URIs / webOrigins in the bundled realm JSON.
  # Backward-compatible host-only override. Prefer publicBaseUrl for new configs.
  publicHost: ""

# Periodic cleanup of stale DCR (Dynamic Client Registration) clients from Keycloak.
# Requires keycloakInstance.enabled and Keycloak operator.
keycloakDcrCleanup:
  enabled: false
  # Realms to scan for stale DCR clients.
  realms:
    - kairos
  # KAIROS-seeded clients that are never pruned (clientId exact match).
  protectedClients:
    - kairos-mcp
    - kairos-cli
  # Remove clients first seen more than N days ago (that are not in protectedClients).
  staleAfterDays: 30
  # Cron schedule (default: weekly Sunday 03:00).
  schedule: "0 3 * * 0"
  # Python image (stdlib only — no pip packages needed). The cleanup script is
  # injected via ConfigMap and uses only urllib, json, datetime, os, sys.
  image: "python:3.12-alpine"
  # Container resource requests/limits.
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  # Keycloak admin Secret name. Defaults to <keycloakInstance.name>-initial-admin.
  adminSecretName: ""
  # If true, log candidates but do not delete (safe first-run).
  dryRun: true
  backoffLimit: 2
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3

postgresCluster:
  enabled: false
  useOwnCluster: false
  namespace: ""
  name: "kairos-postgres"
  crVersion: "2.8.2"
  image: "docker.io/percona/percona-distribution-postgresql:17.7-2"
  pgBackRestImage: "docker.io/percona/percona-pgbackrest:2.57.0-1"
  pgBouncerImage: "docker.io/percona/percona-pgbouncer:1.25.0-1"
  postgresVersion: 17
  instances: 3
  storage: "1Gi"
  backupStorage: "1Gi"
  pgBouncerReplicas: 2
  defaultUser:
    name: "keycloak"
    database: "keycloak"
  customSpec: {}
  vpa:
    enabled: false
    targetKind: "StatefulSet"
    targetName: ""
    updateMode: "Off"
    minAllowed:
      cpu: "100m"
      memory: "128Mi"
    maxAllowed:
      cpu: "2"
      memory: "2Gi"

monitoring:
  serviceMonitor:
    app:
      enabled: false
      release: ""
      interval: "30s"
      scrapeTimeout: "10s"
    qdrant:
      enabled: false
      release: ""
      interval: "30s"
      scrapeTimeout: "10s"
    redis:
      enabled: false
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
      interval: "30s"
    keycloak:
      enabled: false
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
      interval: "30s"
    postgres:
      enabled: false
      release: ""
      serviceNamespace: ""
      serviceSelector: {}
      interval: "30s"
  prometheusRule:
    enabled: false
    release: ""
    rules: []
