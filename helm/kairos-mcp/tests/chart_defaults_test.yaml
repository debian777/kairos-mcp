# helm-unittest — https://github.com/helm-unittest/helm-unittest
---
suite: credentials generator RBAC
templates:
  - credentials-generator-rbac.yaml
tests:
  - it: renders hook ServiceAccount Role and RoleBinding when auto-generating credentials
    asserts:
      - hasDocuments:
          count: 3
      - isKind:
          of: ServiceAccount
        documentIndex: 0
      - isKind:
          of: Role
        documentIndex: 1
      - isKind:
          of: RoleBinding
        documentIndex: 2
      - matchRegex:
          path: metadata.name
          pattern: RELEASE-NAME-credentials-generator
        documentIndex: 0
---
suite: Gateway resource
templates:
  - gateway.yaml
tests:
  - it: renders Gateway when createGateway and explicit gatewayClassName are set
    set:
      gateway.enabled: true
      gateway.createGateway: true
      gateway.hostname: "kairos.example.com"
      gateway.gatewayName: "kairos-gateway"
      gateway.gatewayClassName: "ngrok"
      gateway.tls.certManager.enabled: false
    asserts:
      - isKind:
          of: Gateway
      - equal:
          path: spec.gatewayClassName
          value: ngrok
  - it: does not render Gateway when gatewayClassName is empty and no cluster GatewayClass
    set:
      gateway.enabled: true
      gateway.createGateway: true
      gateway.hostname: "kairos.example.com"
    asserts:
      - hasDocuments:
          count: 0
  - it: renders infrastructure annotations when set
    set:
      gateway.enabled: true
      gateway.createGateway: true
      gateway.hostname: "kairos.example.com"
      gateway.gatewayClassName: "istio"
      gateway.infrastructureAnnotations:
        proxy.istio.io/config: '{"seccompProfile":{"type":"RuntimeDefault"}}'
    asserts:
      - isSubset:
          path: spec.infrastructure.annotations
          content:
            proxy.istio.io/config: '{"seccompProfile":{"type":"RuntimeDefault"}}'
---
suite: MCP HTTPRoute
templates:
  - httproute-mcp.yaml
tests:
  - it: renders HTTPRoute when gateway class is set
    set:
      gateway.enabled: true
      gateway.hostname: "kairos.example.com"
      gateway.gatewayClassName: "ngrok"
      app.enabled: true
    asserts:
      - isKind:
          of: HTTPRoute
      - equal:
          path: spec.parentRefs[0].name
          value: kairos-gateway
  - it: renders CORS ResponseHeaderModifier when cors.enabled
    set:
      gateway.enabled: true
      gateway.hostname: "kairos.example.com"
      gateway.gatewayClassName: "ngrok"
      gateway.routes.mcp.cors.enabled: true
      app.enabled: true
    asserts:
      - isKind:
          of: HTTPRoute
      - contains:
          path: spec.rules[0].filters
          content:
            type: ResponseHeaderModifier
            responseHeaderModifier:
              add:
                - name: Access-Control-Allow-Origin
                  value: "*"
                - name: Access-Control-Allow-Methods
                  value: "POST, OPTIONS"
                - name: Access-Control-Allow-Headers
                  value: "Content-Type, Authorization, MCP-Protocol-Version"
                - name: Access-Control-Max-Age
                  value: "86400"
  - it: does not render CORS filter when cors disabled
    set:
      gateway.enabled: true
      gateway.hostname: "kairos.example.com"
      gateway.gatewayClassName: "ngrok"
      app.enabled: true
    asserts:
      - isKind:
          of: HTTPRoute
      - notContains:
          path: spec.rules[0].filters
          content:
            type: ResponseHeaderModifier
---
suite: app Service
templates:
  - kairos-mcp-service.yaml
tests:
  - it: renders Service when app is enabled
    set:
      app.enabled: true
    asserts:
      - isKind:
          of: Service
      - equal:
          path: spec.ports[0].port
          value: 3000
