apiVersion: v1
kind: Namespace
metadata:
  name: kairos-operators
---
apiVersion: operators.coreos.com/v1
kind: OperatorGroup
metadata:
  name: kairos-operators
  namespace: kairos-operators
spec:
  targetNamespaces:
    - kairos
---
apiVersion: operators.coreos.com/v1alpha1
kind: CatalogSource
metadata:
  name: kairos-catalog
  namespace: olm
spec:
  displayName: kairos-catalog
  image: ghcr.io/debian777/kairos-olm-catalog:latest
  publisher: kairos-mcp
  sourceType: grpc
---
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: ngrok-operator
  namespace: kairos-operators
spec:
  channel: stable
  installPlanApproval: Automatic
  name: ngrok-operator
  source: kairos-catalog
  sourceNamespace: olm
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ngrok
spec:
  controllerName: ngrok.com/gateway-controller
